<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of f and g — Cube Root Functions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden; height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 700px; margin: 0; padding: 6px; height: calc(100% - 12px);
        }
        .sim-layout {
            display: flex; gap: 12px; height: 100%;
        }
        .left-panel {
            width: 160px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column; justify-content: center;
            gap: 18px;
        }
        .panel-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: #888; margin-bottom: 8px;
        }
        .func-row {
            display: flex; align-items: center; gap: 8px;
        }
        .func-swatch {
            width: 24px; height: 3px; border-radius: 2px; flex-shrink: 0;
        }
        .func-def { min-height: 24px; }
        .board-wrapper {
            flex: 1; background: white; border-radius: 8px; padding: 10px;
            height: calc(100% - 20px);
        }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div>
                    <div class="panel-label">Functions</div>
                    <div style="margin-bottom: 14px;">
                        <div class="func-row">
                            <div class="func-swatch" style="background: #222222;"></div>
                            <div class="func-def" id="func-f"></div>
                        </div>
                    </div>
                    <div>
                        <div class="func-row">
                            <div class="func-swatch" style="background: #2563EB;"></div>
                            <div class="func-def" id="func-g"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>

    <script>
        // Render panel equations
        document.addEventListener('DOMContentLoaded', function() {
            katex.render(
                '\\color{#222222}{f(x) = \\sqrt[3]{x}}',
                document.getElementById('func-f'),
                { throwOnError: false }
            );
            katex.render(
                '\\color{#2563EB}{g(x) = a\\!\\sqrt[3]{x}}',
                document.getElementById('func-g'),
                { throwOnError: false }
            );
        });

        // Board setup
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-10.5, 8.5, 10.5, -8.5],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            keepAspectRatio: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        strokeWidth: 0.8,
                        majorHeight: 8,
                        label: { fontSize: 11, color: '#444444' },
                        minorTicks: 0,
                        ticksDistance: 1,
                        insertTicks: false,
                        drawZero: false
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        strokeWidth: 0.8,
                        majorHeight: 8,
                        label: { fontSize: 11, color: '#444444' },
                        minorTicks: 0,
                        ticksDistance: 1,
                        insertTicks: false,
                        drawZero: false
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels
        board.create('text', [10.0, -0.65, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false, color: '#444444'
        });
        board.create('text', [0.35, 8.0, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false, color: '#444444'
        });

        // Color constants
        var COL_F = '#222222';
        var COL_G = '#2563EB';

        // Cube root helper
        function cbrt(x) {
            if (x >= 0) return Math.pow(x, 1 / 3);
            return -Math.pow(-x, 1 / 3);
        }

        // f(x) = cube root of x
        board.create('functiongraph', [
            function(x) { return cbrt(x); }
        ], {
            strokeColor: COL_F, strokeWidth: 1.8,
            fixed: true, highlight: false
        });

        // g(x) = -3 * cube root of x
        board.create('functiongraph', [
            function(x) { return -3 * cbrt(x); }
        ], {
            strokeColor: COL_G, strokeWidth: 1.5,
            fixed: true, highlight: false
        });

        // Curve name labels on board
        board.create('text', [9.0, 2.6, '<i>f</i>'], {
            fontSize: 15, color: COL_F, fixed: true, highlight: false,
            cssStyle: 'font-weight:600;'
        });
        board.create('text', [9.0, -6.8, '<i>g</i>'], {
            fontSize: 15, color: COL_G, fixed: true, highlight: false,
            cssStyle: 'font-weight:600;'
        });
    </script>
</body>
</html>
