<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph D — 3^(2x) and y = 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            width: 300px;
            height: 200px;
            margin: 0 auto;
            padding: 0;
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 6px;
            width: calc(100% - 12px);
            height: calc(100% - 12px);
        }
        #board {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-1.5, 11, 8, -1],
            axis: true,
            keepAspectRatio: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 2
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        var bb = board.getBoundingBox();
        var xMin = bb[0], yMax = bb[1], xMax = bb[2], yMin = bb[3];

        board.create('text', [xMax - 0.3, -0.5, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.2, yMax - 0.3, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        board.create('functiongraph', [
            function(x) { return Math.pow(3, 2 * x); }
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        board.create('functiongraph', [
            function(x) { return 5; }
        ], {
            strokeColor: '#2563EB',
            strokeWidth: 1.5,
            fixed: true,
            highlight: false
        });

        var xInt = Math.log(5) / (2 * Math.log(3));
        board.create('text', [xInt + 0.8, 5.6, 'y = 5'], {
            fontSize: 12,
            color: '#2563EB',
            useKatex: true,
            fixed: true,
            highlight: false
        });

        board.create('point', [xInt, 5], {
            name: '',
            size: 2,
            color: '#222222',
            fixed: true,
            highlight: false,
            showInfobox: false
        });

        board.create('text', [xMin + 0.3, yMax - 0.6, '<b>D</b>'], {
            fontSize: 16,
            color: '#222222',
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
