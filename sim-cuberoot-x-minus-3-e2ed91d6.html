<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Root of x minus 3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 300px;
            margin: 0;
            padding: 4px;
            height: calc(100% - 8px);
        }
        .board-wrapper {
            background: white;
            border-radius: 6px;
            padding: 6px;
            height: calc(100% - 12px);
        }
        #board {
            width: 100%;
            height: 100%;
        }
        /* Hide tick marks but keep tick labels */
        .JXG_tick line {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-1.5, 3.5, 8.5, -3.5],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 5 },
                    ticks: {
                        strokeColor: '#444444',
                        strokeWidth: 0,
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 1,
                        label: {
                            fontSize: 10,
                            offset: [0, -10],
                            anchorX: 'middle'
                        },
                        drawZero: false
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 5 },
                    ticks: {
                        strokeColor: '#444444',
                        strokeWidth: 0,
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 1,
                        label: {
                            fontSize: 10,
                            offset: [-12, 0],
                            anchorX: 'right'
                        },
                        drawZero: false
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [8.1, -0.35, '<i>x</i>'], {
            fontSize: 12, fixed: true, highlight: false
        });
        board.create('text', [0.2, 3.2, '<i>y</i>'], {
            fontSize: 12, fixed: true, highlight: false
        });

        // Cube root function: f(x) = cbrt(x - 3)
        board.create('functiongraph', [
            function(x) {
                var val = x - 3;
                if (val >= 0) {
                    return Math.pow(val, 1 / 3);
                } else {
                    return -Math.pow(-val, 1 / 3);
                }
            },
            -1.5, 8.5
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
