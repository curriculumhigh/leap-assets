<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomial Roots — Multiplicity Explorer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 16px; background: transparent; }
        .container { max-width: 700px; margin: 0; }
        .sim-layout { display: flex; gap: 12px; }
        .left-panel {
            width: 210px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column; gap: 14px;
        }
        .panel-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: #888; margin-bottom: 6px;
        }
        .root-group { margin-bottom: 8px; }
        .root-header {
            display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
        }
        .root-swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .root-label { font-weight: 600; font-size: 13px; }
        .slider-row {
            display: flex; align-items: center; gap: 6px;
            padding-left: 14px;
        }
        .slider-label { font-size: 11px; color: #666; width: 18px; }
        .slider-input {
            flex: 1; -webkit-appearance: none; appearance: none;
            height: 5px; border-radius: 3px; background: #e5e7eb; outline: none;
        }
        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 15px; height: 15px; border-radius: 50%; cursor: pointer;
        }
        .root1-slider::-webkit-slider-thumb { background: #2563EB; }
        .root2-slider::-webkit-slider-thumb { background: #059669; }
        .root3-slider::-webkit-slider-thumb { background: #D97706; }
        .slider-val {
            font-size: 13px; font-variant-numeric: tabular-nums;
            width: 14px; text-align: right; font-weight: 600;
        }
        .equation-section { border-top: 1px solid #e5e7eb; padding-top: 12px; }
        .equation-display { min-height: 24px; margin-bottom: 6px; }
        .degree-row { display: flex; justify-content: space-between; align-items: center; }
        .degree-label { font-size: 11px; color: #888; }
        .degree-val { font-size: 16px; font-weight: 700; }
        .behavior-section { border-top: 1px solid #e5e7eb; padding-top: 12px; }
        .behavior-row {
            font-size: 11px; margin-bottom: 4px;
        }
        .board-wrapper { flex: 1; background: white; border-radius: 8px; padding: 10px; }
        #board { width: 100%; height: 450px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="panel-section">
                    <div class="panel-label">Roots &amp; multiplicities</div>
                    <div class="root-group">
                        <div class="root-header">
                            <div class="root-swatch" style="background: #2563EB;"></div>
                            <span class="root-label" style="color: #2563EB;">x = −2</span>
                        </div>
                        <div class="slider-row">
                            <span class="slider-label">m</span>
                            <input type="range" id="slider-m1" class="slider-input root1-slider" min="1" max="4" step="1" value="1">
                            <span class="slider-val" id="val-m1" style="color: #2563EB;">1</span>
                        </div>
                    </div>
                    <div class="root-group">
                        <div class="root-header">
                            <div class="root-swatch" style="background: #059669;"></div>
                            <span class="root-label" style="color: #059669;">x = 1</span>
                        </div>
                        <div class="slider-row">
                            <span class="slider-label">m</span>
                            <input type="range" id="slider-m2" class="slider-input root2-slider" min="1" max="4" step="1" value="2">
                            <span class="slider-val" id="val-m2" style="color: #059669;">2</span>
                        </div>
                    </div>
                    <div class="root-group">
                        <div class="root-header">
                            <div class="root-swatch" style="background: #D97706;"></div>
                            <span class="root-label" style="color: #D97706;">x = 3</span>
                        </div>
                        <div class="slider-row">
                            <span class="slider-label">m</span>
                            <input type="range" id="slider-m3" class="slider-input root3-slider" min="1" max="4" step="1" value="1">
                            <span class="slider-val" id="val-m3" style="color: #D97706;">1</span>
                        </div>
                    </div>
                </div>
                <div class="panel-section equation-section">
                    <div class="panel-label">Factored form</div>
                    <div class="equation-display" id="equation"></div>
                    <div class="degree-row">
                        <span class="degree-label">Degree</span>
                        <span class="degree-val" id="degree-val">4</span>
                    </div>
                </div>
                <div class="panel-section behavior-section">
                    <div class="panel-label">Look for</div>
                    <div id="observation" style="font-size: 12px; color: #888; line-height: 1.5;"></div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-4.5, 8, 5.5, -8],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    name: 'x',
                    label: { position: 'rt', offset: [-15, -2], fontSize: 14, cssStyle: 'font-style: italic;', parse: false },
                    ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0 }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    name: 'y',
                    label: { position: 'rt', offset: [5, 0], fontSize: 14, cssStyle: 'font-style: italic;', parse: false },
                    ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0 }
                }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        var R1 = -2, R2 = 1, R3 = 3;
        var COL1 = '#2563EB', COL2 = '#059669', COL3 = '#D97706';
        var m1 = 1, m2 = 2, m3 = 1;

        function scaleFactor() {
            var f0 = Math.pow(-R1, m1) * Math.pow(-R2, m2) * Math.pow(-R3, m3);
            if (Math.abs(f0) < 0.01) return 1;
            return 5 / Math.abs(f0);
        }

        function poly(x) {
            var k = scaleFactor();
            return k * Math.pow(x - R1, m1) * Math.pow(x - R2, m2) * Math.pow(x - R3, m3);
        }

        board.create('functiongraph', [
            function(x) { return poly(x); }
        ], { strokeColor: '#222222', strokeWidth: 1.8, fixed: true });

        // Function label
        board.create('text', [3.5, 6.5, 'f(x)'], {
            fontSize: 13, color: '#222222', useKatex: true, fixed: true
        });

        // Root markers
        board.create('point', [R1, 0], { name: '', size: 5, color: COL1, fixed: true, highlight: false });
        board.create('point', [R2, 0], { name: '', size: 5, color: COL2, fixed: true, highlight: false });
        board.create('point', [R3, 0], { name: '', size: 5, color: COL3, fixed: true, highlight: false });

        // Root labels
        board.create('text', [R1, -0.8, 'x\\!=\\!-2'], { fontSize: 10, color: COL1, anchorX: 'middle', useKatex: true, fixed: true });
        board.create('text', [R2, -0.8, 'x\\!=\\!1'], { fontSize: 10, color: COL2, anchorX: 'middle', useKatex: true, fixed: true });
        board.create('text', [R3, -0.8, 'x\\!=\\!3'], { fontSize: 10, color: COL3, anchorX: 'middle', useKatex: true, fixed: true });

        // Slider sync
        var s1 = document.getElementById('slider-m1');
        var s2 = document.getElementById('slider-m2');
        var s3 = document.getElementById('slider-m3');

        function syncFromSliders() {
            m1 = parseInt(s1.value);
            m2 = parseInt(s2.value);
            m3 = parseInt(s3.value);
            board.update();
            updatePanel();
        }

        s1.addEventListener('input', syncFromSliders);
        s2.addEventListener('input', syncFromSliders);
        s3.addEventListener('input', syncFromSliders);

        function updatePanel() {
            document.getElementById('val-m1').textContent = m1;
            document.getElementById('val-m2').textContent = m2;
            document.getElementById('val-m3').textContent = m3;

            var deg = m1 + m2 + m3;
            document.getElementById('degree-val').textContent = deg;

            var eq = 'f(x) = k';
            eq += '\\color{#2563EB}{(x\\!+\\!2)}';
            if (m1 > 1) eq += '^{' + m1 + '}';
            eq += '\\color{#059669}{(x\\!-\\!1)}';
            if (m2 > 1) eq += '^{' + m2 + '}';
            eq += '\\color{#D97706}{(x\\!-\\!3)}';
            if (m3 > 1) eq += '^{' + m3 + '}';
            katex.render(eq, document.getElementById('equation'), { throwOnError: false });

            // Directional prompt — never state crosses/bounces
            document.getElementById('observation').textContent =
                'What does the graph do at each root? Does it depend on whether the multiplicity is odd or even?';
        }

        updatePanel();
    </script>
</body>
</html>
