<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limit Explorer — 1/x as x → ±∞</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 16px; background: transparent; }
        .container { max-width: 700px; margin: 0; }
        .sim-layout { display: flex; gap: 12px; }
        .left-panel {
            width: 200px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .panel-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: #888; margin-bottom: 8px;
        }
        .slider-row {
            display: flex; align-items: center; gap: 8px;
        }
        .slider-name { font-weight: 600; font-size: 14px; width: 14px; color: #2563EB; }
        .slider-input {
            flex: 1; -webkit-appearance: none; appearance: none;
            height: 5px; border-radius: 3px; background: #e5e7eb; outline: none;
        }
        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
            background: #2563EB;
        }
        .slider-val {
            font-size: 13px; font-variant-numeric: tabular-nums;
            width: 36px; text-align: right; font-weight: 600; color: #2563EB;
        }
        .readout-section { border-top: 1px solid #e5e7eb; padding-top: 12px; }
        .readout-display { min-height: 40px; }
        .observation-section { border-top: 1px solid #e5e7eb; padding-top: 12px; }
        .observation-display { min-height: 30px; }
        .board-wrapper { flex: 1; background: white; border-radius: 8px; padding: 10px; }
        #board { width: 100%; height: 450px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="panel-section">
                    <div class="panel-label">Input</div>
                    <div class="slider-row">
                        <span class="slider-name">x</span>
                        <input type="range" id="slider-x" class="slider-input" min="-50" max="50" step="0.1" value="1">
                        <span class="slider-val" id="val-x">1.0</span>
                    </div>
                </div>
                <div class="panel-section readout-section">
                    <div class="panel-label">Value</div>
                    <div class="readout-display" id="readout"></div>
                </div>
                <div class="panel-section observation-section">
                    <div class="panel-label">Look for</div>
                    <div class="observation-display" id="observation"></div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-10, 5, 10, -5],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    name: 'x',
                    label: { position: 'rt', offset: [-15, -2], fontSize: 14, cssStyle: 'font-style: italic;', parse: false },
                    ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 2 }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    name: 'y',
                    label: { position: 'rt', offset: [5, 0], fontSize: 14, cssStyle: 'font-style: italic;', parse: false },
                    ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0 }
                }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        var xVal = 1;

        // Graph of 1/x — two branches
        board.create('functiongraph', [
            function(x) { return 1 / x; }, -10, -0.05
        ], { strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false });

        board.create('functiongraph', [
            function(x) { return 1 / x; }, 0.05, 10
        ], { strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false });

        // Function label
        board.create('text', [4, 1.2, 'f(x) = \\dfrac{1}{x}'], {
            fontSize: 13, color: '#222222', useKatex: true, fixed: true
        });

        // Horizontal asymptote (dashed cyan)
        board.create('line', [[0, 0], [1, 0]], {
            strokeColor: '#0EA5E9', strokeWidth: 1.0, dash: 3,
            fixed: true, highlight: false, name: ''
        });
        board.create('text', [7.5, 0.35, 'y = 0'], {
            fontSize: 10, color: '#0EA5E9', fixed: true
        });

        // Trace point on curve
        var tracePt = board.create('point', [
            function() { return xVal; },
            function() { return Math.abs(xVal) < 0.01 ? NaN : 1 / xVal; }
        ], { name: '', size: 5, color: '#DC2626', fixed: true });

        // Dashed reference lines from point to axes
        board.create('segment', [
            tracePt,
            [function() { return xVal; }, 0]
        ], { strokeColor: '#DC2626', dash: 2, strokeWidth: 1.0, fixed: true, highlight: false, name: '' });

        board.create('segment', [
            tracePt,
            [0, function() { return Math.abs(xVal) < 0.01 ? NaN : 1 / xVal; }]
        ], { strokeColor: '#DC2626', dash: 2, strokeWidth: 1.0, fixed: true, highlight: false, name: '' });

        // Coordinate label on the point (spatial data stays on board)
        board.create('text', [
            function() { return xVal + 0.3; },
            function() {
                var yv = Math.abs(xVal) < 0.01 ? NaN : 1 / xVal;
                return yv + 0.3;
            },
            function() {
                if (Math.abs(xVal) < 0.01) return '';
                var yv = 1 / xVal;
                return '(' + xVal.toFixed(1) + ',\\,' + yv.toFixed(2) + ')';
            }
        ], { fontSize: 10, color: '#DC2626', useKatex: true, fixed: true });

        // ── HTML slider sync ────────────────────────────────────────────
        var sliderEl = document.getElementById('slider-x');

        function syncFromSlider() {
            xVal = parseFloat(sliderEl.value);
            board.update();
            updatePanel();
        }

        sliderEl.addEventListener('input', syncFromSlider);

        function updatePanel() {
            document.getElementById('val-x').textContent = xVal.toFixed(1);

            // Value readout
            var readoutEl = document.getElementById('readout');
            if (Math.abs(xVal) < 0.01) {
                katex.render(
                    '\\frac{1}{x} \\text{ undefined at } x = 0',
                    readoutEl, { throwOnError: false }
                );
            } else {
                var yv = 1 / xVal;
                katex.render(
                    '\\frac{1}{\\color{#2563EB}{' + xVal.toFixed(1) + '}} = \\color{#DC2626}{' + yv.toFixed(6) + '}',
                    readoutEl, { throwOnError: false }
                );
            }

            // Observation — directional prompts only, never conclusions
            var obsEl = document.getElementById('observation');
            if (Math.abs(xVal) < 0.01) {
                obsEl.innerHTML = '<span style="color:#888; font-size:12px;">x is near 0 — what happens to 1/x?</span>';
            } else if (xVal > 10) {
                obsEl.innerHTML = '<span style="color:#888; font-size:12px;">x is large and positive — what value is 1/x approaching?</span>';
            } else if (xVal < -10) {
                obsEl.innerHTML = '<span style="color:#888; font-size:12px;">x is large and negative — what value is 1/x approaching?</span>';
            } else if (xVal > 0 && xVal < 0.5) {
                obsEl.innerHTML = '<span style="color:#888; font-size:12px;">x is small and positive — what is happening to 1/x?</span>';
            } else if (xVal < 0 && xVal > -0.5) {
                obsEl.innerHTML = '<span style="color:#888; font-size:12px;">x is small and negative — what is happening to 1/x?</span>';
            } else {
                obsEl.innerHTML = '<span style="color:#888; font-size:12px;">Move x toward 0 or toward ±∞</span>';
            }
        }

        updatePanel();
    </script>
</body>
</html>
