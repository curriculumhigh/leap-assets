<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Root of x/3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            width: 300px;
            height: 200px;
            margin: 0;
            padding: 0;
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
        #board {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-7, 3.2, 13, -3.2],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 1,
                        drawZero: false,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            offset: [0, -12]
                        }
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 1,
                        drawZero: false,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            offset: [-12, 0]
                        }
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* Axis labels near arrow tips */
        board.create('text', [12.5, -0.35, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false, color: '#444444'
        });
        board.create('text', [0.3, 2.9, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false, color: '#444444'
        });

        /* f(x) = cube root of (x/3) */
        board.create('functiongraph', [
            function(x) {
                var val = x / 3;
                if (val >= 0) {
                    return Math.pow(val, 1 / 3);
                } else {
                    return -Math.pow(-val, 1 / 3);
                }
            },
            -7, 13
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
