<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of -2(3)^x</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 300px; margin: 0; padding: 6px; }
        .board-wrapper { background: white; border-radius: 8px; padding: 6px; }
        #board { width: 288px; height: 188px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-3.5, 3, 4.5, -21],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 5 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 5 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 4
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels
        board.create('text', [4.1, -0.8, '<i>x</i>'], { fontSize: 12, fixed: true, highlight: false });
        board.create('text', [0.2, 2.4, '<i>y</i>'], { fontSize: 12, fixed: true, highlight: false });

        // Curve: f(x) = -2 * 3^x
        board.create('functiongraph', [
            function(x) { return -2 * Math.pow(3, x); }
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true
        });
    </script>
</body>
</html>
