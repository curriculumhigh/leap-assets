<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of 2(3)^x</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; }
        .container { width: 300px; height: 200px; padding: 0; }
        .board-wrapper { background: white; border-radius: 6px; padding: 4px; width: calc(300px - 8px); height: calc(200px - 8px); }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-3.8, 22, 3.8, -3],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 5
                    }
                }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        // Axis labels near arrow tips
        board.create('text', [3.4, -1.2, '<i>x</i>'], {
            fontSize: 12, fixed: true, highlight: false
        });
        board.create('text', [0.25, 21, '<i>y</i>'], {
            fontSize: 12, fixed: true, highlight: false
        });

        // Curve: f(x) = 2 * 3^x
        board.create('functiongraph', [
            function(x) { return 2 * Math.pow(3, x); }
        ], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });

        // Y-intercept point at (0, 2)
        board.create('point', [0, 2], {
            name: '', size: 3, color: '#222222', fixed: true,
            highlight: false, showInfobox: false
        });
    </script>
</body>
</html>
