<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of -4(x+2)^(1/3)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: transparent; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="board"></div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-12, 10, 10, -10],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: {
                            fontSize: 9,
                            offset: [0, -10],
                            color: '#222222'
                        }
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: {
                            fontSize: 9,
                            offset: [-12, 0],
                            color: '#222222'
                        }
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* Axis labels near arrow tips */
        board.create('text', [9.4, -0.9, '<i>x</i>'], {
            fontSize: 12, fixed: true, highlight: false, color: '#222222'
        });
        board.create('text', [0.4, 9.3, '<i>y</i>'], {
            fontSize: 12, fixed: true, highlight: false, color: '#222222'
        });

        /* f(x) = -4(x + 2)^(1/3) */
        board.create('functiongraph', [
            function(x) {
                var u = x + 2;
                if (u >= 0) {
                    return -4 * Math.pow(u, 1 / 3);
                } else {
                    return 4 * Math.pow(-u, 1 / 3);
                }
            },
            -12, 10
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
