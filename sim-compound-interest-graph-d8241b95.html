<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of B(t) — Compound Interest</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 500px;
            height: 300px;
            margin: 0 auto;
            padding: 2px;
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 4px;
            height: calc(100% - 8px);
        }
        #board {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-4, 3400, 28, -400],
            axis: false,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            grid: false
        });

        // ── Custom x-axis ───────────────────────────────────────────────
        board.create('line', [[0, 0], [1, 0]], {
            strokeColor: '#444444',
            strokeWidth: 1.2,
            fixed: true,
            highlight: false,
            lastArrow: { type: 2, size: 6 },
            straightFirst: true,
            straightLast: true
        });

        // x-axis ticks: every 5 from 5 to 25
        var xTickVals = [5, 10, 15, 20, 25];
        for (var i = 0; i < xTickVals.length; i++) {
            var tv = xTickVals[i];
            board.create('segment', [[tv, -55], [tv, 55]], {
                strokeColor: '#444444', strokeWidth: 0.8, fixed: true, highlight: false
            });
            board.create('text', [tv, -190, String(tv)], {
                fontSize: 11, anchorX: 'middle', anchorY: 'middle',
                fixed: true, highlight: false, color: '#444444'
            });
        }

        // ── Custom y-axis ───────────────────────────────────────────────
        board.create('line', [[0, 0], [0, 1]], {
            strokeColor: '#444444',
            strokeWidth: 1.2,
            fixed: true,
            highlight: false,
            lastArrow: { type: 2, size: 6 },
            straightFirst: true,
            straightLast: true
        });

        // y-axis ticks: every 800 from 800 to 3200
        var yTickVals = [800, 1600, 2400, 3200];
        for (var j = 0; j < yTickVals.length; j++) {
            var yv = yTickVals[j];
            board.create('segment', [[-0.3, yv], [0.3, yv]], {
                strokeColor: '#444444', strokeWidth: 0.8, fixed: true, highlight: false
            });
            board.create('text', [-1.8, yv, String(yv)], {
                fontSize: 10, anchorX: 'middle', anchorY: 'middle',
                fixed: true, highlight: false, color: '#444444'
            });
        }

        // ── Grid lines ──────────────────────────────────────────────────
        for (var gx = 5; gx <= 25; gx += 5) {
            board.create('segment', [[gx, -400], [gx, 3400]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4, fixed: true, highlight: false, layer: 0
            });
        }
        for (var gy = 800; gy <= 3200; gy += 800) {
            board.create('segment', [[-4, gy], [28, gy]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4, fixed: true, highlight: false, layer: 0
            });
        }

        // ── Axis labels ─────────────────────────────────────────────────
        board.create('text', [26.5, -200, '<i>t</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.8, 3200, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        // ── Function: B(t) = 500(1 + 0.10/12)^(12t) ───────────────────
        var rate = 1 + 0.10 / 12;

        board.create('functiongraph', [
            function(t) {
                if (t < 0) return NaN;
                return 500 * Math.pow(rate, 12 * t);
            },
            0, 27
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        // Function name label
        board.create('text', [13, 2700, '<i>B</i>(<i>t</i>)'], {
            fontSize: 13,
            color: '#222222',
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
