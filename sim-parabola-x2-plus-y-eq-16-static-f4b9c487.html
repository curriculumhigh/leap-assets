<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parabola x² + y = 16</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 320px;
            margin: 0 auto;
            padding: 6px;
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 10px;
        }
        #board {
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-6, 20, 6, -4],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        drawZero: false,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            anchorX: 'middle',
                            offset: [0, -14]
                        }
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 4,
                        drawZero: false,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            anchorX: 'right',
                            offset: [-8, 0]
                        }
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* Axis labels near arrow tips */
        board.create('text', [5.6, -0.8, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false, color: '#444444'
        });
        board.create('text', [0.3, 19.2, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false, color: '#444444'
        });

        /* Parabola: x² + y = 16  →  y = 16 − x² */
        board.create('functiongraph', [
            function(x) { return 16 - x * x; }
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
