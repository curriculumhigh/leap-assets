<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cube Root Functions</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css"><script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"><script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script><style>html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; } .container { max-width: 700px; margin: 0; padding: 6px; height: calc(100% - 12px); } .sim-layout { display: flex; gap: 12px; height: 100%; } .left-panel { width: 160px; flex-shrink: 0; background: white; border-radius: 8px; padding: 16px; display: flex; flex-direction: column; justify-content: center; gap: 20px; } .func-row { display: flex; align-items: center; gap: 10px; } .func-swatch { width: 24px; height: 3px; border-radius: 2px; flex-shrink: 0; } .func-label { min-height: 24px; } .board-wrapper { flex: 1; background: white; border-radius: 8px; padding: 10px; } #board { width: 100%; height: 100%; }</style></head><body><div class="container"><div class="sim-layout"><div class="left-panel"><div class="func-row"><div class="func-swatch" style="background: #222222;"></div><div class="func-label" id="label-f"></div></div><div class="func-row"><div class="func-swatch" style="background: #2563EB;"></div><div class="func-label" id="label-g"></div></div></div><div class="board-wrapper"><div id="board"></div></div></div></div><script>document.addEventListener('DOMContentLoaded', function() { katex.render('f(x) = \\sqrt[3]{x}', document.getElementById('label-f'), { throwOnError: false }); katex.render('g(x)', document.getElementById('label-g'), { throwOnError: false }); }); var board = JXG.JSXGraph.initBoard('board', { boundingbox: [-10.5, 5, 10.5, -6.5], axis: false, showNavigation: false, showCopyright: false, pan: { enabled: false }, zoom: { enabled: false }, grid: false }); var xAxis = board.create('axis', [[0, 0], [1, 0]], { strokeColor: '#444444', strokeWidth: 1.2, lastArrow: { type: 2, size: 6 }, highlight: false, ticks: { strokeColor: '#444444', ticksDistance: 1, minorTicks: 0, drawZero: false, label: { fontSize: 11, color: '#444444', anchorX: 'middle', offset: [0, -14] } } }); var yAxis = board.create('axis', [[0, 0], [0, 1]], { strokeColor: '#444444', strokeWidth: 1.2, lastArrow: { type: 2, size: 6 }, highlight: false, ticks: { strokeColor: '#444444', ticksDistance: 1, minorTicks: 0, drawZero: false, label: { fontSize: 11, color: '#444444', anchorX: 'right', offset: [-8, 0] } } }); var i; for (i = -10; i <= 10; i++) { if (i === 0) continue; board.create('line', [[i, -7], [i, 6]], { strokeColor: '#D1D5DB', strokeWidth: 0.4, fixed: true, highlight: false }); } for (i = -6; i <= 5; i++) { if (i === 0) continue; board.create('line', [[-11, i], [11, i]], { strokeColor: '#D1D5DB', strokeWidth: 0.4, fixed: true, highlight: false }); } board.create('text', [10.1, -0.45, '<i>x</i>'], { fontSize: 14, fixed: true, highlight: false }); board.create('text', [0.3, 4.6, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false }); function cbrt(x) { if (x >= 0) return Math.pow(x, 1 / 3); return -Math.pow(-x, 1 / 3); } board.create('functiongraph', [function(x) { return cbrt(x); }], { strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false }); board.create('functiongraph', [function(x) { return -2 * cbrt(x) - 1; }], { strokeColor: '#2563EB', strokeWidth: 1.5, fixed: true, highlight: false });</script></body></html>
