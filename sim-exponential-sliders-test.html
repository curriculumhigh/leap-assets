<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential Function — y = ab^x</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 16px; background: #fafafa; }
        .container { max-width: 700px; margin: 0 auto; }
        .sim-layout { display: flex; gap: 12px; }
        .left-panel {
            width: 190px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .panel-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: #888; margin-bottom: 8px;
        }
        .slider-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 10px;
        }
        .slider-name { font-weight: 600; font-size: 14px; width: 14px; text-align: right; }
        .slider-input {
            flex: 1; -webkit-appearance: none; appearance: none;
            height: 5px; border-radius: 3px; background: #e5e7eb; outline: none;
        }
        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
        }
        #slider-a::-webkit-slider-thumb { background: #DC2626; }
        #slider-b::-webkit-slider-thumb { background: #2563EB; }
        .slider-val {
            font-size: 13px; font-variant-numeric: tabular-nums;
            width: 28px; text-align: right; font-weight: 600;
        }
        .equation-section { border-top: 1px solid #e5e7eb; padding-top: 12px; }
        .equation-display { min-height: 26px; }
        .readout-section { border-top: 1px solid #e5e7eb; padding-top: 12px; }
        .board-wrapper { flex: 1; background: white; border-radius: 8px; padding: 10px; }
        #board { width: 100%; height: 450px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="panel-section">
                    <div class="panel-label">Parameters</div>
                    <div class="slider-row">
                        <span class="slider-name" style="color: #DC2626;">a</span>
                        <input type="range" id="slider-a" class="slider-input" min="0.1" max="5" step="0.1" value="1">
                        <span class="slider-val" id="val-a" style="color: #DC2626;">1.0</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-name" style="color: #2563EB;">b</span>
                        <input type="range" id="slider-b" class="slider-input" min="0.1" max="5" step="0.1" value="2">
                        <span class="slider-val" id="val-b" style="color: #2563EB;">2.0</span>
                    </div>
                </div>
                <div class="panel-section equation-section">
                    <div class="panel-label">Equation</div>
                    <div class="equation-display" id="equation"></div>
                </div>
                <div class="panel-section readout-section">
                    <div class="panel-label">Look for</div>
                    <div class="observation-display" id="observation" style="font-size: 12px; color: #888; line-height: 1.5;"></div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-6, 10, 6, -3],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    label: { position: 'rt', offset: [-15, -2], fontSize: 14, cssStyle: 'font-style: italic;', parse: false },
                    name: 'x',
                    ticks: {
                        strokeColor: '#444444', label: { fontSize: 11 },
                        minorTicks: 0, ticksDistance: 2
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    label: { position: 'rt', offset: [5, 0], fontSize: 14, cssStyle: 'font-style: italic;', parse: false },
                    name: 'y',
                    ticks: {
                        strokeColor: '#444444', label: { fontSize: 11 },
                        minorTicks: 0, ticksDistance: 2
                    }
                }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        var aVal = 1, bVal = 2;

        var curve = board.create('functiongraph', [
            function(x) { return aVal * Math.pow(bVal, x); }
        ], { strokeColor: '#222222', strokeWidth: 1.8, fixed: true });

        // Y-intercept point
        board.create('point', [
            0, function() { return aVal; }
        ], { name: '', size: 5, color: '#DC2626', fixed: true });

        // Y-intercept coordinate label
        board.create('text', [0.3, function() { return aVal + 0.3; }, function() {
            return '(0,\\,' + aVal.toFixed(1) + ')';
        }], { fontSize: 11, color: '#DC2626', useKatex: true, fixed: true });

        // Horizontal asymptote
        board.create('line', [[0, 0], [1, 0]], {
            strokeColor: '#0EA5E9', strokeWidth: 1.0, dash: 3,
            fixed: true, highlight: false, name: ''
        });
        board.create('text', [4.5, 0.3, 'y = 0'], {
            fontSize: 10, color: '#0EA5E9', fixed: true
        });

        // Function label
        board.create('text', [
            function() { return bVal >= 1 ? 2.5 : -4; },
            function() {
                var xp = bVal >= 1 ? 2.5 : -4;
                var yp = aVal * Math.pow(bVal, xp);
                return Math.min(yp + 0.5, 9);
            },
            function() { return 'f(x) = ' + aVal.toFixed(1) + ' \\cdot ' + bVal.toFixed(1) + '^{x}'; }
        ], { fontSize: 12, color: '#222222', useKatex: true, fixed: true });

        // HTML slider sync
        var sliderAEl = document.getElementById('slider-a');
        var sliderBEl = document.getElementById('slider-b');

        function syncFromSliders() {
            aVal = parseFloat(sliderAEl.value);
            bVal = parseFloat(sliderBEl.value);
            board.update();
            updatePanel();
        }

        sliderAEl.addEventListener('input', syncFromSliders);
        sliderBEl.addEventListener('input', syncFromSliders);

        function updatePanel() {
            document.getElementById('val-a').textContent = aVal.toFixed(1);
            document.getElementById('val-b').textContent = bVal.toFixed(1);

            katex.render(
                'y = \\color{#DC2626}{' + aVal.toFixed(1) + '} \\cdot \\color{#2563EB}{' + bVal.toFixed(1) + '}^{\\,x}',
                document.getElementById('equation'),
                { throwOnError: false }
            );

            // Directional prompts — never state conclusions
            var obsEl = document.getElementById('observation');
            if (bVal > 1) {
                obsEl.textContent = 'What happens to y as x increases? What about as x decreases?';
            } else if (bVal < 1) {
                obsEl.textContent = 'What happens to y as x increases? Does it ever reach 0?';
            } else {
                obsEl.textContent = 'What kind of function is this when b = 1?';
            }
        }

        updatePanel();
    </script>
</body>
</html>
