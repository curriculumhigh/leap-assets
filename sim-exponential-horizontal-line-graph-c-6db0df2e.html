<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential and Horizontal Line</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 320px; margin: 0 auto; padding: 6px; }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; }
        #board { width: 300px; height: 200px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-5, 10, 10, -2],
            axis: true,
            keepAspectRatio: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [9.5, -0.5, '<i>x</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.3, 9.5, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false });

        // ── Primary curve: y = 3^(x+2) ─────────────────────────────────
        board.create('functiongraph', [
            function(x) { return Math.pow(3, x + 2); }
        ], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });

        // ── Horizontal line: y = 5 ──────────────────────────────────────
        board.create('functiongraph', [
            function(x) { return 5; }
        ], {
            strokeColor: '#2563EB', strokeWidth: 1.5, fixed: true, highlight: false
        });

        // Line label
        board.create('text', [6.5, 5.6, 'y = 5'], {
            fontSize: 13, color: '#2563EB', useKatex: true, fixed: true, highlight: false
        });

        // ── Intersection point ──────────────────────────────────────────
        var xInt = Math.log(5) / Math.log(3) - 2;

        board.create('point', [xInt, 5], {
            name: '', size: 5, color: '#222222', fixed: true,
            highlight: false, showInfobox: false
        });

        // ── Figure label: C ─────────────────────────────────────────────
        board.create('text', [-4.5, 9.2, '<b>C</b>'], {
            fontSize: 14, color: '#555555', fixed: true, highlight: false
        });
    </script>
</body>
</html>
