<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphs of 4^(-x+2) and 3^(x-1)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { width: 500px; height: 300px; margin: 0; padding: 0; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div id="board"></div>
    </div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-1.5, 7, 5, -1],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels
        board.create('text', [4.7, -0.35, '<i>x</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.15, 6.6, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false });

        // f(x) = 4^(-x+2) — primary curve, dark/black
        board.create('functiongraph', [
            function(x) { return Math.pow(4, -x + 2); }
        ], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });

        // g(x) = 3^(x-1) — secondary curve, deep blue
        board.create('functiongraph', [
            function(x) { return Math.pow(3, x - 1); }
        ], {
            strokeColor: '#2563EB', strokeWidth: 1.5, fixed: true, highlight: false
        });

        // Function label: f(x) = 4^{-x+2} — right of curve, clear of overlap
        board.create('text', [0.9, 5.5, 'f(x) = 4^{-x+2}'], {
            useKatex: true, fontSize: 13, color: '#222222',
            fixed: true, highlight: false, anchorX: 'left'
        });

        // Function label: g(x) = 3^{x-1} — right side near increasing curve
        board.create('text', [3.2, 5.5, 'g(x) = 3^{x-1}'], {
            useKatex: true, fontSize: 13, color: '#2563EB',
            fixed: true, highlight: false, anchorX: 'left'
        });
    </script>
</body>
</html>
