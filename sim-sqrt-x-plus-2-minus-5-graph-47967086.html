<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of sqrt(x+2) - 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 6px;
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 10px;
            width: 300px;
            height: 300px;
        }
        #board {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-5, 1, 15, -7],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: 'transparent',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        drawLabels: true,
                        drawZero: false,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            anchorX: 'middle',
                            offset: [0, -12]
                        }
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: 'transparent',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 1,
                        drawLabels: true,
                        drawZero: false,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            anchorX: 'right',
                            offset: [-8, 0]
                        }
                    }
                }
            },
            grid: false
        });

        /* Custom vertical grid lines every 2 units */
        var xMin = -5, xMax = 15, yMin = -7, yMax = 1;
        var xStart = Math.ceil(xMin / 2) * 2;
        for (var gx = xStart; gx <= xMax; gx += 2) {
            if (gx === 0) continue;
            board.create('line', [[gx, 0], [gx, 1]], {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4,
                fixed: true,
                highlight: false
            });
        }

        /* Custom horizontal grid lines every 1 unit */
        var yStart = Math.ceil(yMin);
        for (var gy = yStart; gy <= yMax; gy += 1) {
            if (gy === 0) continue;
            board.create('line', [[0, gy], [1, gy]], {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4,
                fixed: true,
                highlight: false
            });
        }

        /* Axis labels near arrow tips */
        board.create('text', [14.3, -0.5, '<i>x</i>'], {
            fontSize: 14,
            fixed: true,
            highlight: false
        });
        board.create('text', [0.3, 0.6, '<i>y</i>'], {
            fontSize: 14,
            fixed: true,
            highlight: false
        });

        /* f(x) = sqrt(x + 2) - 5 */
        board.create('functiongraph', [
            function(x) {
                if (x < -2) return NaN;
                return Math.sqrt(x + 2) - 5;
            },
            -2, 15
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        /* Endpoint at (-2, -5) — solid filled point */
        board.create('point', [-2, -5], {
            name: '',
            size: 3,
            color: '#222222',
            fixed: true,
            highlight: false,
            showInfobox: false
        });
    </script>
</body>
</html>
