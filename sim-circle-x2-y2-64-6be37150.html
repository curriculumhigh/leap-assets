<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle x² + y² = 64</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 300px;
            margin: 0 auto;
            padding: 6px;
            height: calc(100% - 12px);
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 10px;
            width: 280px;
            height: 280px;
        }
        #board {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-11, 11, 11, -11],
            axis: true,
            keepAspectRatio: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: 'transparent',
                        strokeWidth: 0,
                        tickEndings: [0, 0],
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            offset: [0, -14]
                        },
                        drawLabels: true
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: 'transparent',
                        strokeWidth: 0,
                        tickEndings: [0, 0],
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            offset: [-14, 0]
                        },
                        drawLabels: true
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [10.2, -0.8, '<i>x</i>'], {
            fontSize: 14,
            color: '#444444',
            fixed: true,
            highlight: false
        });
        board.create('text', [0.5, 10.3, '<i>y</i>'], {
            fontSize: 14,
            color: '#444444',
            fixed: true,
            highlight: false
        });

        // Circle: x² + y² = 64, center (0,0), radius 8
        var center = board.create('point', [0, 0], {
            visible: false,
            fixed: true,
            name: ''
        });

        board.create('circle', [center, 8], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fillColor: 'none',
            fillOpacity: 0,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
