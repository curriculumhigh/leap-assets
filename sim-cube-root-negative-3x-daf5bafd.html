<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Root of -3x</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 340px;
            margin: 0 auto;
            padding: 6px;
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 10px;
        }
        #board {
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-6, 6, 6, -6],
            axis: true,
            keepAspectRatio: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        strokeWidth: 0,
                        majorHeight: 0,
                        minorHeight: 0,
                        tickEndings: [0, 0],
                        minorTicks: 0,
                        ticksDistance: 1,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            anchorX: 'middle',
                            offset: [0, -12]
                        },
                        drawZero: false
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        strokeWidth: 0,
                        majorHeight: 0,
                        minorHeight: 0,
                        tickEndings: [0, 0],
                        minorTicks: 0,
                        ticksDistance: 1,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            anchorX: 'right',
                            offset: [-6, 0]
                        },
                        drawZero: false
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [5.6, -0.45, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false, color: '#444444'
        });
        board.create('text', [0.3, 5.6, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false, color: '#444444'
        });

        // Function: f(x) = cube_root(-3x)
        // cube_root(t) = sign(t) * |t|^(1/3) to handle negative radicands
        function cubeRoot(t) {
            if (t >= 0) return Math.pow(t, 1 / 3);
            return -Math.pow(-t, 1 / 3);
        }

        board.create('functiongraph', [
            function(x) {
                return cubeRoot(-3 * x);
            },
            -6, 6
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
