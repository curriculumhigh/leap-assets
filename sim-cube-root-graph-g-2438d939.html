<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of g — Cube Root Function</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            height: 100%; background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 500px; margin: 0; padding: 6px;
            height: calc(100% - 12px);
        }
        .sim-layout {
            display: flex; gap: 10px; height: 100%;
        }
        .left-panel {
            width: 120px; flex-shrink: 0;
            background: white; border-radius: 8px;
            padding: 14px 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .hover-msg {
            font-size: 12px; color: #888; line-height: 1.5;
            text-align: center;
        }
        .board-wrapper {
            flex: 1; background: white; border-radius: 8px;
            padding: 10px; height: calc(100% - 20px);
            position: relative;
        }
        #board { width: 100%; height: 100%; }
        .coord-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="hover-msg">
                    Hover over the points to see their coordinates
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
                <div class="coord-tooltip" id="tooltip"></div>
            </div>
        </div>
    </div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-3, 8, 31, -2.5],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            keepAspectRatio: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11, anchorX: 'middle', offset: [0, -14] },
                        minorTicks: 0,
                        ticksDistance: 5,
                        majorHeight: 0
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11, anchorX: 'right', offset: [-6, 0] },
                        minorTicks: 0,
                        ticksDistance: 1,
                        majorHeight: 0
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* Axis labels near arrow tips */
        board.create('text', [30.2, -0.5, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.5, 7.6, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        /* ── Curve: g(x) = 2 * cbrt(x) ────────────────────────────── */
        board.create('functiongraph', [
            function(x) {
                if (x < 0) return NaN;
                return 2 * Math.cbrt(x);
            },
            -0.01, 31
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        /* ── Graph label: g ────────────────────────────────────────── */
        board.create('text', [25, 6.8, 'g'], {
            fontSize: 15, color: '#222222', fixed: true, highlight: false,
            cssStyle: 'font-style:italic; font-weight:600;'
        });

        /* ── Tooltip setup ─────────────────────────────────────────── */
        var tooltip = document.getElementById('tooltip');
        var boardContainer = document.getElementById('board');
        var COL_PT = '#222222';

        function formatVal(v) {
            if (Math.abs(v - Math.round(v)) < 0.001) return String(Math.round(v));
            return v.toFixed(2);
        }

        function showTooltip(pt, color) {
            var xCoord = pt.X();
            var yCoord = pt.Y();
            var latex = '\\color{' + color + '}{\\left(' + formatVal(xCoord)
                      + ',\\,' + formatVal(yCoord) + '\\right)}';
            katex.render(latex, tooltip, { throwOnError: false });
            tooltip.style.borderColor = color;
            tooltip.style.display = 'block';

            var rect = boardContainer.getBoundingClientRect();
            var coords = new JXG.Coords(JXG.COORDS_BY_USER, [xCoord, yCoord], board);
            var sx = coords.scrCoords[1];
            var sy = coords.scrCoords[2];

            /* Position tooltip — shift left if near right edge */
            var tipLeft = sx + 14;
            var tipTop = sy - 28;

            var tw = tooltip.offsetWidth;
            if (tipLeft + tw > rect.width - 5) {
                tipLeft = sx - tw - 14;
            }
            if (tipTop < 5) {
                tipTop = sy + 14;
            }

            tooltip.style.left = tipLeft + 'px';
            tooltip.style.top = tipTop + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        /* ── Key points ────────────────────────────────────────────── */
        var keyPoints = [
            [0, 0],
            [1, 2],
            [8, 4],
            [27, 6]
        ];

        for (var i = 0; i < keyPoints.length; i++) {
            (function(coords) {
                var pt = board.create('point', coords, {
                    name: '',
                    size: 5,
                    color: COL_PT,
                    fixed: true,
                    showInfobox: false,
                    highlight: true,
                    highlightFillColor: COL_PT,
                    highlightStrokeColor: COL_PT,
                    highlightSize: 6
                });
                pt.on('over', function() { showTooltip(pt, COL_PT); });
                pt.on('out', function() { hideTooltip(); });
            })(keyPoints[i]);
        }
    </script>
</body>
</html>
