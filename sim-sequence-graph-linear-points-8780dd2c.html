<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Graph — Linear Pattern</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 500px; margin: 0 auto; padding: 6px; height: calc(100% - 12px); }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; height: calc(100% - 20px); }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-1.2, 17.5, 5.8, -1.5],
            axis: false,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false }
        });

        // Manual axes without ticks
        board.create('arrow', [[-1.2, 0], [5.8, 0]], {
            strokeColor: '#444444',
            strokeWidth: 1.2,
            lastArrow: { type: 2, size: 6 },
            fixed: true,
            highlight: false
        });

        board.create('arrow', [[0, -1.5], [0, 17.5]], {
            strokeColor: '#444444',
            strokeWidth: 1.2,
            lastArrow: { type: 2, size: 6 },
            fixed: true,
            highlight: false
        });

        // Grid — 1 unit spacing on both axes
        var xMin = -1.2, xMax = 5.8, yMin = -1.5, yMax = 17.5;

        // Vertical grid lines
        for (var gx = 1; gx <= 5; gx++) {
            board.create('segment', [[gx, yMin], [gx, yMax]], {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4,
                fixed: true,
                highlight: false
            });
        }

        // Horizontal grid lines — every 1 unit
        for (var gy = 1; gy <= 17; gy++) {
            board.create('segment', [[xMin, gy], [xMax, gy]], {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4,
                fixed: true,
                highlight: false
            });
        }

        // Y-axis value labels — every 2 units
        for (var ly = 2; ly <= 16; ly += 2) {
            board.create('text', [-0.35, ly, ly.toString()], {
                fontSize: 11,
                color: '#444444',
                fixed: true,
                highlight: false,
                anchorX: 'right',
                anchorY: 'middle'
            });
        }

        // X-axis value labels
        for (var lx = 1; lx <= 5; lx++) {
            board.create('text', [lx, -0.5, lx.toString()], {
                fontSize: 11,
                color: '#444444',
                fixed: true,
                highlight: false,
                anchorX: 'middle',
                anchorY: 'top'
            });
        }

        // Axis labels
        board.create('text', [5.4, -0.5, '<i>x</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.2, 17, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false });

        // Sequence points
        var points = [
            [1, 3],
            [2, 7],
            [3, 11],
            [4, 15]
        ];

        for (var i = 0; i < points.length; i++) {
            board.create('point', [points[i][0], points[i][1]], {
                name: '',
                size: 5,
                color: '#222222',
                fixed: true,
                highlight: false,
                showInfobox: false
            });
        }
    </script>
</body>
</html>
