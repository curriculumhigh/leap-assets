<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Root Function Graph</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 500px; margin: 0; padding: 6px; height: calc(100% - 12px); }
        .sim-layout { display: flex; gap: 10px; height: 100%; }
        .left-panel {
            width: 150px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 14px;
            display: flex; flex-direction: column; justify-content: center; gap: 16px;
        }
        .panel-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: #888; margin-bottom: 4px;
        }
        .equation-display { min-height: 28px; }
        .hover-msg {
            font-size: 12px; color: #777; line-height: 1.5;
        }
        .board-wrapper { flex: 1; background: white; border-radius: 8px; padding: 8px; height: calc(100% - 16px); }
        #board { width: 100%; height: 100%; }
        .coord-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div>
                    <div class="panel-label">Function rule</div>
                    <div class="equation-display" id="equation"></div>
                </div>
                <div>
                    <div class="hover-msg">Hover over the plotted points to see their coordinates.</div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>
    <div class="coord-tooltip" id="tooltip"></div>

    <script>
        // Render equation in panel
        katex.render('r = 4.8\\,\\sqrt[3]{V}', document.getElementById('equation'), { throwOnError: false });

        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-3, 18, 30, -3],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            keepAspectRatio: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1,
                        majorHeight: 0,
                        minorHeight: 0
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1,
                        majorHeight: 0,
                        minorHeight: 0
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [29, -1.2, '<i>V</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.5, 17.2, '<i>r</i>'], { fontSize: 14, fixed: true, highlight: false });

        // Function: r = 4.8 * V^(1/3)
        function rFunc(V) {
            if (V >= 0) {
                return 4.8 * Math.pow(V, 1 / 3);
            } else {
                return -4.8 * Math.pow(-V, 1 / 3);
            }
        }

        // Plot the curve
        board.create('functiongraph', [
            function(V) { return rFunc(V); }, -3, 30
        ], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });

        // ── Tooltip setup ───────────────────────────────────────────────
        var tooltip = document.getElementById('tooltip');
        var boardContainer = document.getElementById('board');
        var PT_COLOR = '#222222';

        function formatValKatex(v) {
            var absV = Math.abs(v);
            var sign = v < 0 ? '-' : '';
            if (Math.abs(absV - 15.625) < 0.001) return sign + '15.625';
            if (Math.abs(absV - 4.8) < 0.01) return sign + '4.8';
            if (Math.abs(absV - 9.6) < 0.01) return sign + '9.6';
            if (Math.abs(absV - 14.4) < 0.01) return sign + '14.4';
            if (Math.abs(v - Math.round(v)) < 0.001) return String(Math.round(v));
            return v.toFixed(2);
        }

        function showTooltip(pt) {
            var xCoord = pt.X();
            var yCoord = pt.Y();
            var latex = '\\color{' + PT_COLOR + '}{\\left(' + formatValKatex(xCoord)
                      + ',\\,' + formatValKatex(yCoord) + '\\right)}';
            katex.render(latex, tooltip, { throwOnError: false });
            tooltip.style.borderColor = PT_COLOR;
            tooltip.style.display = 'block';
            var rect = boardContainer.getBoundingClientRect();
            var coords = new JXG.Coords(JXG.COORDS_BY_USER, [xCoord, yCoord], board);
            var sx = coords.scrCoords[1] + rect.left;
            var sy = coords.scrCoords[2] + rect.top;
            tooltip.style.left = (sx + 14) + 'px';
            tooltip.style.top = (sy - 28) + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        // ── Key points ──────────────────────────────────────────────────
        var keyPoints = [
            [0, 0],
            [1, 4.8],
            [8, 9.6],
            [15.625, 12],
            [27, 14.4]
        ];

        for (var i = 0; i < keyPoints.length; i++) {
            (function(idx) {
                var xv = keyPoints[idx][0];
                var yv = keyPoints[idx][1];
                var pt = board.create('point', [xv, yv], {
                    name: '', size: 4, color: PT_COLOR, fixed: true,
                    showInfobox: false, highlight: true,
                    highlightFillColor: PT_COLOR, highlightStrokeColor: PT_COLOR,
                    highlightSize: 5
                });
                pt.on('over', function() { showTooltip(pt); });
                pt.on('out', function() { hideTooltip(); });
            })(i);
        }
    </script>
</body>
</html>
