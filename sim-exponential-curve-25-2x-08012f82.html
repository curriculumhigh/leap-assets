<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential Curve — 25·2^x</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 6px;
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 10px;
        }
        #board {
            width: 480px;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-0.7, 230, 4.3, -25],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 1,
                        minorHeight: -1,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 1,
                        minorHeight: -1,
                        ticksDistance: 50
                    }
                }
            },
            grid: false
        });

        /* Manual grid lines for readability */
        var i;
        /* Major horizontal grid lines at 50-unit intervals */
        for (i = 50; i <= 200; i += 50) {
            board.create('line', [[0, i], [1, i]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4,
                straightFirst: true, straightLast: true,
                fixed: true, highlight: false
            });
        }
        /* Minor horizontal grid lines at 25-unit intervals */
        for (i = 25; i <= 225; i += 50) {
            board.create('line', [[0, i], [1, i]], {
                strokeColor: '#E5E7EB', strokeWidth: 0.3,
                straightFirst: true, straightLast: true,
                fixed: true, highlight: false
            });
        }
        /* Vertical grid lines at each integer x */
        for (i = 1; i <= 4; i++) {
            board.create('line', [[i, 0], [i, 1]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4,
                straightFirst: true, straightLast: true,
                fixed: true, highlight: false
            });
        }

        /* Axis labels near arrow tips */
        board.create('text', [4.05, -12, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.12, 223, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        /* Exponential curve: f(x) = 25 · 2^x */
        board.create('functiongraph', [
            function(x) { return 25 * Math.pow(2, x); }
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        /* Key points — small circles, no labels */
        var keyPoints = [
            [0, 25],
            [1, 50],
            [2, 100],
            [3, 200]
        ];

        for (var p = 0; p < keyPoints.length; p++) {
            board.create('point', keyPoints[p], {
                name: '',
                size: 2,
                color: '#222222',
                fixed: true,
                highlight: false,
                showInfobox: false
            });
        }
    </script>
</body>
</html>
