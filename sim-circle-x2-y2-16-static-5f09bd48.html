<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle x² + y² = 16</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 300px;
            margin: 0 auto;
            padding: 6px;
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 10px;
        }
        #board {
            width: 280px;
            height: 280px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-6, 6, 6, -6],
            axis: true,
            keepAspectRatio: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        strokeWidth: 0,
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            offset: [0, -14]
                        },
                        drawZero: false
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        strokeWidth: 0,
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            offset: [-14, 0]
                        },
                        drawZero: false
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* Axis labels near arrow tips */
        board.create('text', [5.5, -0.5, '<i>x</i>'], {
            fontSize: 14,
            fixed: true,
            highlight: false
        });
        board.create('text', [0.3, 5.6, '<i>y</i>'], {
            fontSize: 14,
            fixed: true,
            highlight: false
        });

        /* Circle: x² + y² = 16, center (0,0), radius 4 */
        var center = board.create('point', [0, 0], {
            visible: false,
            fixed: true,
            name: ''
        });

        board.create('circle', [center, 4], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fillColor: 'none',
            fillOpacity: 0,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
