<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Graph — Points Plot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: transparent; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="board"></div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-0.9, 20.5, 7.2, -2.5],
            axis: false,
            grid: false,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false }
        });

        var xMin = -0.9, xMax = 7.2, yMin = -2.5, yMax = 20.5;
        var i;

        for (i = 0; i <= 7; i++) {
            board.create('line', [[i, 0], [i, 1]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4,
                straightFirst: true, straightLast: true, fixed: true, highlight: false
            });
        }
        for (i = 0; i <= 20; i += 2) {
            board.create('line', [[0, i], [1, i]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4,
                straightFirst: true, straightLast: true, fixed: true, highlight: false
            });
        }

        board.create('arrow', [[-0.5, 0], [6.9, 0]], {
            strokeColor: '#444444', strokeWidth: 1.2, lastArrow: { type: 2, size: 6 }, fixed: true, highlight: false
        });
        board.create('arrow', [[0, -1.5], [0, 20]], {
            strokeColor: '#444444', strokeWidth: 1.2, lastArrow: { type: 2, size: 6 }, fixed: true, highlight: false
        });

        var xTicks = [1, 2, 3, 4, 5, 6];
        for (i = 0; i < xTicks.length; i++) {
            board.create('text', [xTicks[i], -1.1, String(xTicks[i])], {
                fontSize: 11, color: '#444444', anchorX: 'middle', anchorY: 'middle', fixed: true, highlight: false
            });
        }
        var yTicks = [2, 4, 6, 8, 10, 12, 14, 16, 18];
        for (i = 0; i < yTicks.length; i++) {
            board.create('text', [-0.55, yTicks[i], String(yTicks[i])], {
                fontSize: 11, color: '#444444', anchorX: 'middle', anchorY: 'middle', fixed: true, highlight: false
            });
        }

        board.create('text', [6.7, -1.1, '<i>x</i>'], { fontSize: 14, color: '#444444', fixed: true, highlight: false });
        board.create('text', [0.3, 19.8, '<i>y</i>'], { fontSize: 14, color: '#444444', fixed: true, highlight: false });

        board.create('functiongraph', [function(x) { return 0.5 * x * x; }, 0, 6], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });

        var pts = [[0, 0], [2, 2], [4, 8], [6, 18]];
        for (i = 0; i < pts.length; i++) {
            board.create('point', pts[i], {
                name: '', size: 4, color: '#222222', fixed: true, highlight: false, showInfobox: false
            });
        }
    </script>
</body>
</html>
