<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>f and g on Same Coordinate Plane</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: transparent; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="board"></div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-3.5, 6.5, 10.5, -6.5],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: {
                            fontSize: 10,
                            offset: [0, -12]
                        },
                        drawZero: false
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: {
                            fontSize: 10,
                            offset: [-12, 0]
                        },
                        drawZero: false
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* Axis labels near arrow tips */
        board.create('text', [10.1, -0.5, '<i>x</i>'], {
            fontSize: 12, fixed: true, highlight: false
        });
        board.create('text', [0.25, 6.1, '<i>y</i>'], {
            fontSize: 12, fixed: true, highlight: false
        });

        /* ── f(x) = sqrt(x) ──────────────────────────────────── */
        board.create('functiongraph', [
            function(x) { return Math.sqrt(x); },
            0, 10.5
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        /* Label f */
        board.create('text', [9.2, 3.5, '<i>f</i>'], {
            fontSize: 13,
            color: '#222222',
            fixed: true,
            highlight: false
        });

        /* Key points on f (no labels) */
        var fPoints = [[0, 0], [1, 1], [4, 2], [9, 3]];
        for (var i = 0; i < fPoints.length; i++) {
            board.create('point', fPoints[i], {
                name: '',
                size: 3,
                color: '#222222',
                fixed: true,
                highlight: false,
                showInfobox: false
            });
        }

        /* ── g(x) = x² + 4x − 1 ─────────────────────────────── */
        board.create('functiongraph', [
            function(x) { return x * x + 4 * x - 1; },
            -3.5, 1.5
        ], {
            strokeColor: '#2563EB',
            strokeWidth: 1.5,
            fixed: true,
            highlight: false
        });

        /* Label g */
        board.create('text', [1.15, 5.2, '<i>g</i>'], {
            fontSize: 13,
            color: '#2563EB',
            fixed: true,
            highlight: false
        });

        /* Key points on g (no labels) */
        var gPoints = [[-2, -5], [-1, -4], [0, -1], [1, 4]];
        for (var i = 0; i < gPoints.length; i++) {
            board.create('point', gPoints[i], {
                name: '',
                size: 3,
                color: '#2563EB',
                fixed: true,
                highlight: false,
                showInfobox: false
            });
        }
    </script>
</body>
</html>
