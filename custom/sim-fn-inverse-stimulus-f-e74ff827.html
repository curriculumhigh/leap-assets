<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 500px; margin: 0; padding: 6px; height: calc(100% - 12px); box-sizing: border-box; }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; height: calc(100% - 20px); box-sizing: border-box; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-6, 6, 6, -4],
            axis: true, keepAspectRatio: true,
            showNavigation: false, showCopyright: false,
            pan: { enabled: false }, zoom: { enabled: false },
            defaultAxes: {
                x: { strokeColor: '#444444', strokeWidth: 1.2,
                     lastArrow: { type: 2, size: 6 },
                     ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 2 } },
                y: { strokeColor: '#444444', strokeWidth: 1.2,
                     lastArrow: { type: 2, size: 6 },
                     ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 2 } }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        // Axis labels at arrow tips
        board.create('text', [5.5, -0.5, '<i>x</i>'], { fontSize: 13, fixed: true, highlight: false });
        board.create('text', [0.3, 5.6, '<i>y</i>'], { fontSize: 13, fixed: true, highlight: false });

        // y = x dashed reference
        board.create('line', [[0, 0], [1, 1]], {
            strokeColor: '#888888', strokeWidth: 1.0, dash: 2,
            fixed: true, highlight: false,
            point1: { visible: false }, point2: { visible: false }
        });
        board.create('text', [4.7, 5.0, 'y = x'], {
            useKatex: true, fontSize: 12, color: '#888888',
            fixed: true, highlight: false
        });

        // f curve (primary)
        var fPts = [[-2,-4],[0,-2],[1,0],[3,4]];
        var fGliders = fPts.map(function(p) {
            return board.create('point', p, { visible: false, fixed: true });
        });
        board.create('curve', JXG.Math.Numerics.CardinalSpline(fGliders, 0.5), {
            strokeColor: '#222222', strokeWidth: 1.8,
            fixed: true, highlight: false
        });
        fPts.forEach(function(p) {
            board.create('point', p, {
                name: '', size: 3, color: '#222222',
                fixed: true, highlight: false, showInfobox: false
            });
        });

        // f label near the curve (upper right area, away from y=x label)
        board.create('text', [3.4, 4.5, 'f(x)'], {
            useKatex: true, fontSize: 13, color: '#222222',
            fixed: true, highlight: false
        });
    </script>
</body>
</html>
