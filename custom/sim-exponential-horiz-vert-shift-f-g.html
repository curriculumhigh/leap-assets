<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphs of f(x) and g(x) — Horizontal + Vertical Shift</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 700px; margin: 0; padding: 6px; height: calc(100% - 12px); }
        .sim-layout { display: flex; gap: 12px; height: 100%; }
        .left-panel {
            width: 175px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column; gap: 14px;
        }
        .panel-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: #888; margin-bottom: 6px;
        }
        .func-def { min-height: 24px; margin-bottom: 8px; }
        .hint-text { font-size: 12px; color: #777; line-height: 1.5; }
        .board-wrapper { flex: 1; background: white; border-radius: 8px; padding: 10px; }
        #board { width: 100%; height: 100%; }
        .coord-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="panel-section">
                    <div class="panel-label">Functions</div>
                    <div class="func-def" id="func-f"></div>
                    <div class="func-def" id="func-g"></div>
                </div>
                <div class="panel-section" style="border-top: 1px solid #e5e7eb; padding-top: 12px;">
                    <div class="hint-text">Hover over highlighted points to see coordinates and the shift.</div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>
    <div class="coord-tooltip" id="tooltip-f"></div>
    <div class="coord-tooltip" id="tooltip-g"></div>

    <script>
        // ── Panel KaTeX labels ──────────────────────────────────────────
        katex.render('f(x) = 3\\!\\left(\\tfrac{1}{2}\\right)^{\\!x}', document.getElementById('func-f'), { throwOnError: false });
        katex.render('\\color{#2563EB}{g(x) = 3\\!\\left(\\tfrac{1}{2}\\right)^{\\!x+4}\\!- 1}', document.getElementById('func-g'), { throwOnError: false });

        // ── Board ───────────────────────────────────────────────────────
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-7, 10, 4, -3],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        // Axis labels
        board.create('text', [3.6, -0.6, '<i>x</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.25, 9.5, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false });

        // ── Colors ──────────────────────────────────────────────────────
        var COL_F = '#222222';
        var COL_G = '#2563EB';
        var COL_ASYM = '#0EA5E9';
        var COL_ARROW = '#DC2626';

        // ── Functions ───────────────────────────────────────────────────
        function fFunc(x) { return 3 * Math.pow(0.5, x); }
        function gFunc(x) { return 3 * Math.pow(0.5, x + 4) - 1; }

        // ── Curves ──────────────────────────────────────────────────────
        board.create('functiongraph', [fFunc, -7, 4], {
            strokeColor: COL_F, strokeWidth: 1.5, fixed: true, highlight: false
        });
        board.create('functiongraph', [gFunc, -7, 4], {
            strokeColor: COL_G, strokeWidth: 1.8, fixed: true, highlight: false
        });

        // ── Asymptote for g(x): y = -1 ─────────────────────────────────
        board.create('line', [[0, -1], [1, -1]], {
            strokeColor: COL_ASYM, strokeWidth: 1.0, dash: 2,
            fixed: true, highlight: false
        });

        // ── Function labels on the board ────────────────────────────────
        board.create('text', [1.5, 4.5, 'f(x)'], {
            fontSize: 13, color: COL_F, fixed: true, highlight: false, useKatex: true
        });
        board.create('text', [-2.5, 3.5, 'g(x)'], {
            fontSize: 13, color: COL_G, fixed: true, highlight: false, useKatex: true
        });

        // ── Shift arrows (hidden by default) ────────────────────────────
        var COL_VERT = '#8B5CF6';  // purple — vertical shift
        // COL_ARROW (#DC2626 red) — horizontal shift

        // Pair 0: f(0, 3) → vert down to (0, 2) → horiz left to (-4, 2)
        var vArrow0 = board.create('arrow', [[0, 3], [0, 2]], {
            strokeColor: COL_VERT, strokeWidth: 1.8, dash: 2,
            lastArrow: { type: 2, size: 6 },
            fixed: true, highlight: false, visible: false
        });
        var vLabel0 = board.create('text', [-0.6, 2.5, '\\mathbf{-1}'], {
            fontSize: 12, color: COL_VERT, fixed: true, highlight: false,
            useKatex: true, visible: false, anchorX: 'right'
        });
        var hArrow0 = board.create('arrow', [[0, 2], [-4, 2]], {
            strokeColor: COL_ARROW, strokeWidth: 1.8, dash: 2,
            lastArrow: { type: 2, size: 6 },
            fixed: true, highlight: false, visible: false
        });
        var hLabel0 = board.create('text', [-2, 1.5, '\\mathbf{-4}'], {
            fontSize: 12, color: COL_ARROW, fixed: true, highlight: false,
            useKatex: true, visible: false, anchorX: 'middle'
        });

        // Pair 1: f(1, 1.5) → vert down to (1, 0.5) → horiz left to (-3, 0.5)
        var vArrow1 = board.create('arrow', [[1, 1.5], [1, 0.5]], {
            strokeColor: COL_VERT, strokeWidth: 1.8, dash: 2,
            lastArrow: { type: 2, size: 6 },
            fixed: true, highlight: false, visible: false
        });
        var vLabel1 = board.create('text', [0.4, 1.0, '\\mathbf{-1}'], {
            fontSize: 12, color: COL_VERT, fixed: true, highlight: false,
            useKatex: true, visible: false, anchorX: 'right'
        });
        var hArrow1 = board.create('arrow', [[1, 0.5], [-3, 0.5]], {
            strokeColor: COL_ARROW, strokeWidth: 1.8, dash: 2,
            lastArrow: { type: 2, size: 6 },
            fixed: true, highlight: false, visible: false
        });
        var hLabel1 = board.create('text', [-1, 0.0, '\\mathbf{-4}'], {
            fontSize: 12, color: COL_ARROW, fixed: true, highlight: false,
            useKatex: true, visible: false, anchorX: 'middle'
        });

        // ── Tooltip setup ───────────────────────────────────────────────
        var tooltipF = document.getElementById('tooltip-f');
        var tooltipG = document.getElementById('tooltip-g');
        var boardContainer = document.getElementById('board');

        function formatVal(v) {
            if (Math.abs(v - Math.round(v)) < 0.001) return String(Math.round(v));
            // Check for common fractions
            if (Math.abs(v - 0.5) < 0.001) return '\\tfrac{1}{2}';
            if (Math.abs(v - 1.5) < 0.001) return '\\tfrac{3}{2}';
            return v.toFixed(2);
        }

        function positionTooltip(tooltipEl, pt, offsetX, offsetY) {
            var rect = boardContainer.getBoundingClientRect();
            var coords = new JXG.Coords(JXG.COORDS_BY_USER, [pt.X(), pt.Y()], board);
            var sx = coords.scrCoords[1] + rect.left;
            var sy = coords.scrCoords[2] + rect.top;
            tooltipEl.style.left = (sx + offsetX) + 'px';
            tooltipEl.style.top = (sy + offsetY) + 'px';
        }

        function showPairTooltips(fPt, gPt, hArr, hLbl, vArr, vLbl) {
            var latexF = '\\color{' + COL_F + '}{\\left(' + formatVal(fPt.X()) + ',\\,' + formatVal(fPt.Y()) + '\\right)}';
            katex.render(latexF, tooltipF, { throwOnError: false });
            tooltipF.style.borderColor = COL_F;
            tooltipF.style.display = 'block';
            positionTooltip(tooltipF, fPt, 14, -28);

            var latexG = '\\color{' + COL_G + '}{\\left(' + formatVal(gPt.X()) + ',\\,' + formatVal(gPt.Y()) + '\\right)}';
            katex.render(latexG, tooltipG, { throwOnError: false });
            tooltipG.style.borderColor = COL_G;
            tooltipG.style.display = 'block';
            positionTooltip(tooltipG, gPt, 20, -50);

            hArr.setAttribute({ visible: true });
            hLbl.setAttribute({ visible: true });
            vArr.setAttribute({ visible: true });
            vLbl.setAttribute({ visible: true });
            board.update();
        }

        function hideAllOverlays() {
            tooltipF.style.display = 'none';
            tooltipG.style.display = 'none';
            hArrow0.setAttribute({ visible: false }); hLabel0.setAttribute({ visible: false });
            vArrow0.setAttribute({ visible: false }); vLabel0.setAttribute({ visible: false });
            hArrow1.setAttribute({ visible: false }); hLabel1.setAttribute({ visible: false });
            vArrow1.setAttribute({ visible: false }); vLabel1.setAttribute({ visible: false });
            board.update();
        }

        // ── Key points on f(x) ──────────────────────────────────────────
        var fPt0 = board.create('point', [0, 3], {
            name: '', size: 5, color: COL_F, fixed: true,
            showInfobox: false, highlight: true,
            highlightFillColor: COL_F, highlightStrokeColor: COL_F
        });
        var fPt1 = board.create('point', [1, 1.5], {
            name: '', size: 5, color: COL_F, fixed: true,
            showInfobox: false, highlight: true,
            highlightFillColor: COL_F, highlightStrokeColor: COL_F
        });

        // ── Key points on g(x) ──────────────────────────────────────────
        var gPt0 = board.create('point', [-4, 2], {
            name: '', size: 5, color: COL_G, fixed: true,
            showInfobox: false, highlight: true,
            highlightFillColor: COL_G, highlightStrokeColor: COL_G
        });
        var gPt1 = board.create('point', [-3, 0.5], {
            name: '', size: 5, color: COL_G, fixed: true,
            showInfobox: false, highlight: true,
            highlightFillColor: COL_G, highlightStrokeColor: COL_G
        });

        // ── Hover events — pair 0 (x=0 on f) ────────────────────────────
        fPt0.on('over', function() { showPairTooltips(fPt0, gPt0, hArrow0, hLabel0, vArrow0, vLabel0); });
        fPt0.on('out', function() { hideAllOverlays(); });
        gPt0.on('over', function() { showPairTooltips(fPt0, gPt0, hArrow0, hLabel0, vArrow0, vLabel0); });
        gPt0.on('out', function() { hideAllOverlays(); });

        // ── Hover events — pair 1 (x=1 on f) ────────────────────────────
        fPt1.on('over', function() { showPairTooltips(fPt1, gPt1, hArrow1, hLabel1, vArrow1, vLabel1); });
        fPt1.on('out', function() { hideAllOverlays(); });
        gPt1.on('over', function() { showPairTooltips(fPt1, gPt1, hArrow1, hLabel1, vArrow1, vLabel1); });
        gPt1.on('out', function() { hideAllOverlays(); });
    </script>
</body>
</html>
