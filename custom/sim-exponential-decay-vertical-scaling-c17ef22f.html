<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential Decay — f(x) and g(x)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 450px; margin: 0 auto; padding: 6px; height: calc(100% - 12px); }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; height: calc(100% - 20px); }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-4, 5, 7, -11],
            axis: false,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false }
        });

        // Create axes manually for full control over ticks
        var xAxis = board.create('axis', [[0, 0], [1, 0]], {
            strokeColor: '#444444', strokeWidth: 1.2,
            lastArrow: { type: 2, size: 6 },
            ticks: {
                strokeColor: '#444444',
                label: { fontSize: 11 },
                minorTicks: 0,
                ticksDistance: 1,
                drawZero: false
            },
            highlight: false
        });

        var yAxis = board.create('axis', [[0, 0], [0, 1]], {
            strokeColor: '#444444', strokeWidth: 1.2,
            lastArrow: { type: 2, size: 6 },
            ticks: {
                strokeColor: '#444444',
                label: { fontSize: 11 },
                minorTicks: 0,
                ticksDistance: 1,
                drawZero: false
            },
            highlight: false
        });

        // Grid — draw manually with lines at every 1 unit
        var bb = board.getBoundingBox();
        var i;
        for (i = Math.ceil(bb[0]); i <= Math.floor(bb[2]); i++) {
            if (i === 0) continue;
            board.create('line', [[i, 0], [i, 1]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4,
                straightFirst: true, straightLast: true,
                fixed: true, highlight: false, dash: 0
            });
        }
        for (i = Math.ceil(bb[3]); i <= Math.floor(bb[1]); i++) {
            if (i === 0) continue;
            board.create('line', [[0, i], [1, i]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4,
                straightFirst: true, straightLast: true,
                fixed: true, highlight: false, dash: 0
            });
        }

        // Axis labels
        board.create('text', [6.6, -0.5, '<i>x</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.25, 4.6, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false });

        // f(x) = (3/4)^x — primary curve
        board.create('functiongraph', [
            function(x) { return Math.pow(0.75, x); }
        ], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });

        // g(x) = -5*(3/4)^x — secondary curve
        board.create('functiongraph', [
            function(x) { return -5 * Math.pow(0.75, x); }
        ], {
            strokeColor: '#2563EB', strokeWidth: 1.5, fixed: true, highlight: false
        });

        // f(x) label — above the curve at x = -3.2, f(-3.2) ≈ 2.37
        board.create('text', [-3.2, 3.0, 'f(x) = \\left(\\tfrac{3}{4}\\right)^{\\!x}'], {
            useKatex: true, fontSize: 13, color: '#222222', fixed: true, highlight: false
        });

        // g(x) label — below the curve at x = 2.8, g(2.8) ≈ -2.11
        board.create('text', [2.8, -2.9, 'g(x) = a\\!\\left(\\tfrac{3}{4}\\right)^{\\!x}'], {
            useKatex: true, fontSize: 13, color: '#2563EB', fixed: true, highlight: false
        });
    </script>
</body>
</html>
