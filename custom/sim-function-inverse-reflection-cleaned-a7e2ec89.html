<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function and Inverse Reflection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #222; }
        .container { max-width: 700px; margin: 0; padding: 6px; height: calc(100% - 12px); box-sizing: border-box; }
        .sim-layout { display: flex; gap: 12px; height: 100%; align-items: stretch; }
        .left-pane { width: 200px; flex-shrink: 0; padding: 8px 4px 8px 8px; box-sizing: border-box; display: flex; flex-direction: column; }
        .legend { font-size: 12.5px; line-height: 1.9; margin-bottom: 14px; }
        .legend .swatch { display: inline-block; width: 20px; height: 0; border-top: 2px solid; vertical-align: middle; margin-right: 8px; }
        .legend .dashed { border-top-style: dashed; }
        .instructions { font-size: 12.5px; line-height: 1.5; color: #333; margin-bottom: 14px; }
        .readout { font-size: 14px; line-height: 1.9; }
        .readout .row { margin-bottom: 4px; }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; flex: 1; height: calc(100% - 20px); box-sizing: border-box; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-pane">
                <div class="legend">
                    <div><span class="swatch" style="border-color: #2563EB;"></span> <span id="legend-f"></span></div>
                    <div><span class="swatch" style="border-color: #DC2626;"></span> <span id="legend-finv"></span></div>
                    <div><span class="swatch dashed" style="border-color: #888888;"></span> <span id="legend-yx"></span></div>
                </div>
                <div class="instructions">Drag <span id="instr-A"></span> along the graph of <span id="instr-f"></span>. The point <span id="instr-Ap"></span> moves along <span id="instr-finv"></span>, with the coordinates swapped.</div>
                <div class="readout">
                    <div class="row" id="readout-A" style="color: #2563EB;"></div>
                    <div class="row" id="readout-Ap" style="color: #DC2626;"></div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>
    <script>
        function kr(target, latex) {
            katex.render(latex, document.getElementById(target), { throwOnError: false });
        }
        kr('legend-f', 'f(x)');
        kr('legend-finv', 'f^{-1}(x)');
        kr('legend-yx', 'y = x');
        kr('instr-A', 'A');
        kr('instr-f', 'f');
        kr('instr-Ap', "A'");
        kr('instr-finv', 'f^{-1}');

        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-7, 7, 7, -7],
            axis: true,
            keepAspectRatio: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 2 }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 2 }
                }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        // Axis labels at arrow tips
        board.create('text', [6.5, -0.55, '<i>x</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.3, 6.5, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false });

        var COL_F = '#2563EB';
        var COL_FINV = '#DC2626';
        var COL_REF = '#888888';

        // y = x dashed reference
        board.create('line', [[0, 0], [1, 1]], {
            strokeColor: COL_REF, strokeWidth: 1.0, dash: 2,
            fixed: true, highlight: false,
            point1: { visible: false }, point2: { visible: false }
        });

        // f(x) = x²/4 − 5, x ≥ 0
        var fFunc = function(x) { return x * x / 4 - 5; };
        board.create('functiongraph', [fFunc, 0, 7], {
            strokeColor: COL_F, strokeWidth: 1.8, fixed: true, highlight: false
        });

        // f⁻¹(x) = 2√(x+5), x ≥ −5
        var fInvFunc = function(x) { return 2 * Math.sqrt(x + 5); };
        board.create('functiongraph', [fInvFunc, -5, 7], {
            strokeColor: COL_FINV, strokeWidth: 1.8, fixed: true, highlight: false
        });

        // Endpoint dots — small, no labels (legend covers identification)
        board.create('point', [0, -5], { name: '', size: 3, color: COL_F, fixed: true, highlight: false });
        board.create('point', [-5, 0], { name: '', size: 3, color: COL_FINV, fixed: true, highlight: false });

        // Invisible curve to constrain glider
        var fCurveForGlider = board.create('functiongraph', [fFunc, 0.3, 6.5], { visible: false });

        // Draggable A on f
        var A = board.create('glider', [3, fFunc(3), fCurveForGlider], {
            name: '', size: 5, color: COL_F,
            showInfobox: false, highlight: true,
            highlightFillColor: COL_F, highlightStrokeColor: COL_F
        });

        // Linked A' on f⁻¹
        var APrime = board.create('point', [
            function() { return A.Y(); },
            function() { return A.X(); }
        ], {
            name: '', size: 5, color: COL_FINV,
            fixed: true, showInfobox: false, highlight: false
        });

        // Midpoint on y=x — small visual cue
        board.create('point', [
            function() { return (A.X() + APrime.X()) / 2; },
            function() { return (A.Y() + APrime.Y()) / 2; }
        ], { name: '', size: 2, color: COL_REF, fixed: true, highlight: false, showInfobox: false });

        // Dashed segment AA'
        board.create('segment', [A, APrime], {
            strokeColor: COL_REF, strokeWidth: 1.0, dash: 2,
            fixed: true, highlight: false
        });

        // Static KaTeX labels for A and A' near the points (content is fixed, only position updates)
        board.create('text', [
            function() { return A.X() + 0.35; },
            function() { return A.Y() + 0.5; },
            'A'
        ], { useKatex: true, fontSize: 14, color: COL_F, fixed: true, highlight: false });

        board.create('text', [
            function() { return APrime.X() - 0.55; },
            function() { return APrime.Y() - 0.6; },
            "A'"
        ], { useKatex: true, fontSize: 14, color: COL_FINV, fixed: true, highlight: false });

        function fmtVal(v) {
            if (Math.abs(v - Math.round(v)) < 0.05) return String(Math.round(v));
            return v.toFixed(1);
        }

        function updateReadout() {
            var ax = fmtVal(A.X());
            var ay = fmtVal(A.Y());
            kr('readout-A', 'A = (' + ax + ',\\ ' + ay + ')');
            kr('readout-Ap', "A' = (" + ay + ',\\ ' + ax + ')');
        }
        updateReadout();
        board.on('move', updateReadout);
        board.on('up', updateReadout);
    </script>
</body>
</html>
