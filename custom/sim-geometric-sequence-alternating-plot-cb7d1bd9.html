<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Sequence Plot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 550px; margin: 0; padding: 6px; height: calc(100% - 12px); }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; height: calc(100% - 20px); }
        #board { width: 100%; height: 100%; }
        .coord-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <div class="coord-tooltip" id="tooltip"></div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-0.8, 130, 8.5, -220],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 50
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels
        board.create('text', [8.1, -12, '<i>n</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.3, 118, 'a_n'], { fontSize: 14, fixed: true, highlight: false, useKatex: true });

        // Sequence data
        var data = [
            [1, -3],
            [2, 6],
            [3, -12],
            [4, 24],
            [5, -48],
            [6, 96],
            [7, -192]
        ];

        var COL_PT = '#222222';

        // Tooltip setup
        var tooltip = document.getElementById('tooltip');
        var boardContainer = document.getElementById('board');

        function showTooltip(pt, color) {
            var xCoord = pt.X();
            var yCoord = pt.Y();
            var latex = '\\color{' + color + '}{\\left(' + Math.round(xCoord) + ',\\,' + Math.round(yCoord) + '\\right)}';
            katex.render(latex, tooltip, { throwOnError: false });
            tooltip.style.borderColor = color;
            tooltip.style.display = 'block';
            var rect = boardContainer.getBoundingClientRect();
            var coords = new JXG.Coords(JXG.COORDS_BY_USER, [xCoord, yCoord], board);
            var sx = coords.scrCoords[1] + rect.left;
            var sy = coords.scrCoords[2] + rect.top;
            tooltip.style.left = (sx + 14) + 'px';
            tooltip.style.top = (sy - 28) + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        // Create points
        for (var i = 0; i < data.length; i++) {
            (function(idx) {
                var pt = board.create('point', [data[idx][0], data[idx][1]], {
                    name: '',
                    size: 5,
                    color: COL_PT,
                    fixed: true,
                    showInfobox: false,
                    highlight: true,
                    highlightFillColor: COL_PT,
                    highlightStrokeColor: COL_PT
                });
                pt.on('over', function() { showTooltip(pt, COL_PT); });
                pt.on('out', function() { hideTooltip(); });
            })(i);
        }
    </script>
</body>
</html>
