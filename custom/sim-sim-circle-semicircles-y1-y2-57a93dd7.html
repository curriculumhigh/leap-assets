<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle as Two Semicircles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            height: 100%; background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 500px; margin: 0; padding: 6px;
            height: calc(100% - 12px);
        }
        .sim-layout {
            display: flex; gap: 10px; height: 100%;
        }
        .left-panel {
            width: 140px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column;
            justify-content: center; gap: 18px;
        }
        .eq-group {
            display: flex; align-items: center; gap: 8px;
        }
        .eq-swatch {
            width: 20px; height: 3px; border-radius: 2px; flex-shrink: 0;
        }
        .eq-text {
            min-height: 24px; display: flex; align-items: center;
        }
        .board-wrapper {
            flex: 1; background: white; border-radius: 8px;
            padding: 10px; height: calc(100% - 20px);
        }
        #board {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="eq-group">
                    <div class="eq-swatch" style="background: #222222;"></div>
                    <div class="eq-text" id="eq-y1"></div>
                </div>
                <div class="eq-group">
                    <div class="eq-swatch" style="background: #2563EB;"></div>
                    <div class="eq-text" id="eq-y2"></div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>

    <script>
        // Render panel equations
        katex.render('y_1 = \\sqrt{25 - x^2}', document.getElementById('eq-y1'), { throwOnError: false });
        katex.render('y_2 = -\\sqrt{25 - x^2}', document.getElementById('eq-y2'), { throwOnError: false });

        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-8, 7.5, 8, -7.5],
            axis: true,
            keepAspectRatio: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 1,
                        insertTicks: false,
                        drawLabels: true,
                        label: { fontSize: 11, offset: [0, -12] }
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 1,
                        insertTicks: false,
                        drawLabels: true,
                        label: { fontSize: 11, offset: [-12, 0] }
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels
        board.create('text', [7.5, -0.6, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.35, 7.1, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        // y1 = sqrt(25 - x^2) — upper semicircle
        board.create('functiongraph', [
            function(x) {
                var val = 25 - x * x;
                if (val < 0) return NaN;
                return Math.sqrt(val);
            }, -5, 5
        ], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });

        // y2 = -sqrt(25 - x^2) — lower semicircle
        board.create('functiongraph', [
            function(x) {
                var val = 25 - x * x;
                if (val < 0) return NaN;
                return -Math.sqrt(val);
            }, -5, 5
        ], {
            strokeColor: '#2563EB', strokeWidth: 1.5, fixed: true, highlight: false
        });

        // Curve labels on board
        board.create('text', [1.2, 5.4, 'y_1'], {
            fontSize: 13, color: '#222222', useKatex: true, fixed: true, highlight: false
        });
        board.create('text', [1.2, -5.8, 'y_2'], {
            fontSize: 13, color: '#2563EB', useKatex: true, fixed: true, highlight: false
        });
    </script>
</body>
</html>
