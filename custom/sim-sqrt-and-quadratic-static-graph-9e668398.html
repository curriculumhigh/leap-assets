<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Root Functions f and g</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: transparent; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="board"></div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-5.5, 6.5, 10.5, -1.5],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: { fontSize: 10, offset: [0, -12] },
                        drawZero: false
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: { fontSize: 10, offset: [-12, 0] },
                        drawZero: false
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [10.0, -0.55, '<i>x</i>'], {
            fontSize: 12, fixed: true, highlight: false
        });
        board.create('text', [0.3, 6.1, '<i>y</i>'], {
            fontSize: 12, fixed: true, highlight: false
        });

        // ── Colors ──────────────────────────────────────────────────────
        var COL_F = '#222222';
        var COL_G = '#2563EB';

        // ── f(x) = sqrt(x) ─────────────────────────────────────────────
        board.create('functiongraph', [
            function(x) { return (x >= 0) ? Math.sqrt(x) : NaN; },
            0, 10.5
        ], {
            strokeColor: COL_F,
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        // ── g(x) = sqrt(-x + 5) + 2 ───────────────────────────────────
        board.create('functiongraph', [
            function(x) { return (-x + 5 >= 0) ? Math.sqrt(-x + 5) + 2 : NaN; },
            -5.5, 5
        ], {
            strokeColor: COL_G,
            strokeWidth: 1.5,
            fixed: true,
            highlight: false
        });

        // ── Key points on f (no labels) ─────────────────────────────────
        var fPoints = [[0, 0], [1, 1], [4, 2], [9, 3]];
        for (var i = 0; i < fPoints.length; i++) {
            board.create('point', fPoints[i], {
                name: '',
                size: 3,
                color: COL_F,
                fixed: true,
                highlight: false,
                showInfobox: false
            });
        }

        // ── Transformed key points on g (no labels) ─────────────────────
        // Transformation: (a, b) → (-a + 5, b + 2)
        var gPoints = [[5, 2], [4, 3], [1, 4], [-4, 5]];
        for (var j = 0; j < gPoints.length; j++) {
            board.create('point', gPoints[j], {
                name: '',
                size: 3,
                color: COL_G,
                fixed: true,
                highlight: false,
                showInfobox: false
            });
        }

        // ── Curve labels (name only, no rule) ───────────────────────────
        board.create('text', [8.5, 2.6, '<i>f</i>'], {
            fontSize: 13,
            color: COL_F,
            fixed: true,
            highlight: false
        });

        board.create('text', [-4.2, 4.3, '<i>g</i>'], {
            fontSize: 13,
            color: COL_G,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
