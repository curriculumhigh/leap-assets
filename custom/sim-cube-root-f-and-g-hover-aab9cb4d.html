<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Root Functions f and g</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden; height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 620px; margin: 0; padding: 6px;
        }
        .sim-layout {
            display: flex; gap: 10px;
        }
        .left-panel {
            width: 160px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 14px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .panel-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: #888; margin-bottom: 4px;
        }
        .panel-instruction {
            font-size: 12px; color: #555; line-height: 1.5;
        }
        .legend-row {
            display: flex; align-items: center; gap: 7px; margin-bottom: 5px;
        }
        .legend-swatch {
            width: 18px; height: 3px; border-radius: 2px; flex-shrink: 0;
        }
        .legend-label {
            font-size: 12px; font-weight: 600;
        }
        .board-wrapper {
            width: 400px; height: 300px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 10px;
        }
        #board { width: 100%; height: 100%; }
        .coord-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="panel-section">
                    <div class="panel-label">Legend</div>
                    <div class="legend-row">
                        <div class="legend-swatch" style="background: #222222;"></div>
                        <span class="legend-label" style="color: #222222;" id="legend-f"></span>
                    </div>
                    <div class="legend-row">
                        <div class="legend-swatch" style="background: #2563EB;"></div>
                        <span class="legend-label" style="color: #2563EB;" id="legend-g"></span>
                    </div>
                </div>
                <div class="panel-section" style="border-top: 1px solid #e5e7eb; padding-top: 10px;">
                    <div class="panel-label">Explore</div>
                    <div class="panel-instruction">
                        Hover over the points to see their coordinates.
                    </div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>
    <div class="coord-tooltip" id="tooltip"></div>

    <script>
        // Render legend labels with KaTeX
        katex.render('f(x) = \\sqrt[3]{x}', document.getElementById('legend-f'), { throwOnError: false });
        katex.render('g(x) = \\sqrt[3]{-27x}', document.getElementById('legend-g'), { throwOnError: false });

        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-10, 4, 10, -4],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        strokeWidth: 0,
                        majorHeight: 0,
                        minorHeight: 0,
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 2
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        strokeWidth: 0,
                        majorHeight: 0,
                        minorHeight: 0,
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        // Axis labels
        board.create('text', [9.4, -0.4, '<i>x</i>'], { fontSize: 13, fixed: true, highlight: false });
        board.create('text', [0.35, 3.65, '<i>y</i>'], { fontSize: 13, fixed: true, highlight: false });

        // Colors
        var COL_F = '#222222';
        var COL_G = '#2563EB';

        // ── Curves ──────────────────────────────────────────────────────
        board.create('functiongraph', [
            function(x) { return Math.cbrt(x); }
        ], { strokeColor: COL_F, strokeWidth: 1.8, fixed: true, highlight: false });

        board.create('functiongraph', [
            function(x) { return Math.cbrt(-27 * x); }
        ], { strokeColor: COL_G, strokeWidth: 1.5, fixed: true, highlight: false });

        // ── Function labels on board ────────────────────────────────────
        board.create('text', [8.2, 2.3, 'f'], {
            fontSize: 14, color: COL_F, fixed: true, highlight: false,
            cssStyle: 'font-style:italic; font-weight:600'
        });
        board.create('text', [-1.8, 3.3, 'g'], {
            fontSize: 14, color: COL_G, fixed: true, highlight: false,
            cssStyle: 'font-style:italic; font-weight:600'
        });

        // ── Tooltip setup ───────────────────────────────────────────────
        var tooltip = document.getElementById('tooltip');
        var boardContainer = document.getElementById('board');

        function formatValKatex(v) {
            var absV = Math.abs(v);
            var sign = v < 0 ? '-' : '';

            if (Math.abs(absV - 8 / 27) < 0.001) return sign + '\\tfrac{8}{27}';
            if (Math.abs(absV - 1 / 27) < 0.001) return sign + '\\tfrac{1}{27}';
            if (Math.abs(absV - 1 / 3) < 0.001) return sign + '\\tfrac{1}{3}';
            if (Math.abs(v - Math.round(v)) < 0.001) return String(Math.round(v));
            return v.toFixed(2);
        }

        function showTooltip(pt, color) {
            var xCoord = pt.X();
            var yCoord = pt.Y();
            var latex = '\\color{' + color + '}{\\left(' + formatValKatex(xCoord)
                      + ',\\,' + formatValKatex(yCoord) + '\\right)}';
            katex.render(latex, tooltip, { throwOnError: false });
            tooltip.style.borderColor = color;
            tooltip.style.display = 'block';

            var rect = boardContainer.getBoundingClientRect();
            var coords = new JXG.Coords(JXG.COORDS_BY_USER, [xCoord, yCoord], board);
            var sx = coords.scrCoords[1] + rect.left;
            var sy = coords.scrCoords[2] + rect.top;
            tooltip.style.left = (sx + 12) + 'px';
            tooltip.style.top = (sy - 26) + 'px';
        }

        function hideTooltip() { tooltip.style.display = 'none'; }

        // ── Helper to create a hover point ──────────────────────────────
        function makeHoverPoint(xv, yv, color) {
            var pt = board.create('point', [xv, yv], {
                name: '', size: 4, color: color, fixed: true,
                showInfobox: false, highlight: true,
                highlightFillColor: color, highlightStrokeColor: color,
                highlightSize: 5
            });
            pt.on('over', function() { showTooltip(pt, color); });
            pt.on('out', function() { hideTooltip(); });
            return pt;
        }

        // ── Key points on f ────────────────────────────────────────────
        makeHoverPoint(-8, -2, COL_F);
        makeHoverPoint(-1, -1, COL_F);
        makeHoverPoint(1, 1, COL_F);
        makeHoverPoint(8, 2, COL_F);

        // ── Key points on g ────────────────────────────────────────────
        makeHoverPoint(8 / 27, -2, COL_G);
        makeHoverPoint(1 / 27, -1, COL_G);
        makeHoverPoint(-1 / 27, 1, COL_G);
        makeHoverPoint(-8 / 27, 2, COL_G);

        // ── Origin point (shared) ───────────────────────────────────────
        makeHoverPoint(0, 0, COL_F);
    </script>
</body>
</html>
