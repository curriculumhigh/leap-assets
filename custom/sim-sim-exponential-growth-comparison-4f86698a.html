<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential Growth Comparison</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 700px; margin: 0; padding: 6px; height: calc(100% - 12px); }
        .sim-layout { display: flex; gap: 12px; height: 100%; }
        .left-panel {
            width: 175px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .panel-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: #888; margin-bottom: 8px;
        }
        .func-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
        }
        .func-swatch {
            width: 20px; height: 3px; border-radius: 2px; flex-shrink: 0;
        }
        .func-label { min-height: 24px; }
        .hint-section {
            border-top: 1px solid #e5e7eb; padding-top: 14px; margin-top: auto;
        }
        .hint-text {
            font-size: 11px; color: #999; line-height: 1.5;
        }
        .board-wrapper { flex: 1; background: white; border-radius: 8px; padding: 10px; position: relative; }
        #board { width: 100%; height: 100%; }
        .coord-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="panel-section">
                    <div class="panel-label">Functions</div>
                    <div class="func-row">
                        <div class="func-swatch" style="background: #222222;"></div>
                        <div class="func-label" id="label-f"></div>
                    </div>
                    <div class="func-row">
                        <div class="func-swatch" style="background: #2563EB;"></div>
                        <div class="func-label" id="label-g"></div>
                    </div>
                </div>
                <div class="hint-section">
                    <div class="hint-text">Hover over the intersection point to view its coordinates.</div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
                <div class="coord-tooltip" id="tooltip"></div>
            </div>
        </div>
    </div>

    <script>
        // Render panel labels
        katex.render('M(t) = 200(1.15)^t', document.getElementById('label-f'), { throwOnError: false });
        katex.render('F(t) = 800(1.03)^t', document.getElementById('label-g'), { throwOnError: false });

        // Functions
        function fM(t) { return 200 * Math.pow(1.15, t); }
        function fF(t) { return 800 * Math.pow(1.03, t); }

        // Compute intersection: 200(1.15)^t = 800(1.03)^t
        var tIntersect = Math.log(4) / Math.log(1.15 / 1.03);
        var yIntersect = fM(tIntersect);

        // Bounding box
        var yMax = Math.ceil(fM(22) / 500) * 500 + 300;
        var yMin = -400;

        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-1.5, yMax, 23, yMin],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 2
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 500
                    }
                }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        // Axis labels
        board.create('text', [22.3, yMin + 80, '<i>t</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.4, yMax - 150, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false });

        // Curve colors
        var COL_M = '#222222';
        var COL_F = '#2563EB';

        // Plot M(t)
        board.create('functiongraph', [function(t) { return fM(t); }, -1.5, 23], {
            strokeColor: COL_M, strokeWidth: 1.8, fixed: true, highlight: false
        });

        // Plot F(t)
        board.create('functiongraph', [function(t) { return fF(t); }, -1.5, 23], {
            strokeColor: COL_F, strokeWidth: 1.5, fixed: true, highlight: false
        });

        // Curve labels
        board.create('text', [15.5, fM(16.5) + 350, 'M(t)'], {
            fontSize: 13, color: COL_M, useKatex: true, fixed: true, highlight: false
        });
        board.create('text', [20, fF(20) + 250, 'F(t)'], {
            fontSize: 13, color: COL_F, useKatex: true, fixed: true, highlight: false
        });

        // Intersection point
        var ptIntersect = board.create('point', [tIntersect, yIntersect], {
            name: '', size: 5, color: COL_M, fixed: true,
            showInfobox: false, highlight: true,
            highlightFillColor: COL_M, highlightStrokeColor: COL_M
        });

        // Custom KaTeX tooltip
        var tooltip = document.getElementById('tooltip');
        var boardContainer = document.getElementById('board');

        function formatVal(v) {
            if (Math.abs(v - Math.round(v)) < 0.01) return String(Math.round(v));
            return v.toFixed(2);
        }

        function showTooltip(pt) {
            var xCoord = pt.X();
            var yCoord = pt.Y();
            var latex = '\\left(' + formatVal(xCoord) + ',\\;' + formatVal(yCoord) + '\\right)';
            katex.render(latex, tooltip, { throwOnError: false });
            tooltip.style.borderColor = '#222222';
            tooltip.style.display = 'block';

            var rect = boardContainer.getBoundingClientRect();
            var coords = new JXG.Coords(JXG.COORDS_BY_USER, [xCoord, yCoord], board);
            var sx = coords.scrCoords[1];
            var sy = coords.scrCoords[2];
            tooltip.style.left = (sx + 14) + 'px';
            tooltip.style.top = (sy - 28) + 'px';
        }

        function hideTooltip() { tooltip.style.display = 'none'; }

        ptIntersect.on('over', function() { showTooltip(ptIntersect); });
        ptIntersect.on('out', function() { hideTooltip(); });
    </script>
</body>
</html>
