<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 280px; margin: 0; padding: 4px; height: calc(100% - 8px); box-sizing: border-box; }
        .board-wrapper { background: white; border-radius: 6px; padding: 6px; height: calc(100% - 12px); box-sizing: border-box; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div class="container"><div class="board-wrapper"><div id="board"></div></div></div>
<script>
var board = JXG.JSXGraph.initBoard('board', {
    boundingbox: [-5.5, 5.5, 5.5, -5.5], axis: true, keepAspectRatio: true,
    showNavigation: false, showCopyright: false,
    pan: { enabled: false }, zoom: { enabled: false },
    defaultAxes: {
        x: { strokeColor: '#444', strokeWidth: 1.0, lastArrow: { type: 2, size: 4 },
             ticks: { strokeColor: '#444', label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 2 } },
        y: { strokeColor: '#444', strokeWidth: 1.0, lastArrow: { type: 2, size: 4 },
             ticks: { strokeColor: '#444', label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 2 } }
    },
    grid: { strokeColor: '#E5E7EB', strokeWidth: 0.3 }
});

board.create('functiongraph', [function(x) { return 4 * Math.exp(-x*x/4); }, -5, 5], {
    strokeColor: '#222', strokeWidth: 1.8, fixed: true, highlight: false
});
</script>
</body>
</html>
