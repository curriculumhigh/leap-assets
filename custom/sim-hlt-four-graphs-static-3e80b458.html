<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #222; }
        .container { max-width: 720px; margin: 0; padding: 6px; height: calc(100% - 12px); box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; height: 100%; }
        .panel { display: flex; flex-direction: column; }
        .board-wrapper { background: white; border-radius: 8px; padding: 6px; flex: 1; box-sizing: border-box; position: relative; }
        .board { width: 100%; height: 100%; }
        .label { position: absolute; top: 8px; left: 12px; font-size: 16px; font-weight: 600; color: #222; z-index: 10; }
    </style>
</head>
<body>
<div class="container">
    <div class="grid">
        <div class="panel"><div class="board-wrapper"><div class="label">A</div><div class="board" id="boardA"></div></div></div>
        <div class="panel"><div class="board-wrapper"><div class="label">B</div><div class="board" id="boardB"></div></div></div>
        <div class="panel"><div class="board-wrapper"><div class="label">C</div><div class="board" id="boardC"></div></div></div>
        <div class="panel"><div class="board-wrapper"><div class="label">D</div><div class="board" id="boardD"></div></div></div>
    </div>
</div>
<script>
function makeBoard(id) {
    return JXG.JSXGraph.initBoard(id, {
        boundingbox: [-5.5, 5.5, 5.5, -5.5],
        axis: true, keepAspectRatio: true,
        showNavigation: false, showCopyright: false,
        pan: { enabled: false }, zoom: { enabled: false },
        defaultAxes: {
            x: { strokeColor: '#444444', strokeWidth: 1.0, lastArrow: { type: 2, size: 4 },
                 ticks: { strokeColor: '#444444', label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 2 } },
            y: { strokeColor: '#444444', strokeWidth: 1.0, lastArrow: { type: 2, size: 4 },
                 ticks: { strokeColor: '#444444', label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 2 } }
        },
        grid: { strokeColor: '#E5E7EB', strokeWidth: 0.3 }
    });
}

var COL = '#222222';

// A — strictly increasing cubic-like through origin (no turning points)
var bA = makeBoard('boardA');
bA.create('functiongraph', [function(x) { return x*x*x/40 + x/3; }, -5, 5],
    { strokeColor: COL, strokeWidth: 1.8, fixed: true, highlight: false });

// B — downward-opening parabola, vertex at (0, 3)
var bB = makeBoard('boardB');
bB.create('functiongraph', [function(x) { return 3 - x*x/2.5; }, -4.2, 4.2],
    { strokeColor: COL, strokeWidth: 1.8, fixed: true, highlight: false });

// C — strictly decreasing exponential decay (upper-left → lower-right, approaches x-axis)
var bC = makeBoard('boardC');
bC.create('functiongraph', [function(x) { return Math.exp(-x/1.5); }, -2.5, 5],
    { strokeColor: COL, strokeWidth: 1.8, fixed: true, highlight: false });

// D — sine-like wave between y = -2 and y = 2, several humps
var bD = makeBoard('boardD');
bD.create('functiongraph', [function(x) { return 2 * Math.sin(1.2 * x); }, -5, 5],
    { strokeColor: COL, strokeWidth: 1.8, fixed: true, highlight: false });
</script>
</body>
</html>
