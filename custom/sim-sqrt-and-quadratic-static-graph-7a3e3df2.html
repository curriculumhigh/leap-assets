<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Root and Transformed Square Root</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: transparent; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="board"></div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-7, 4.5, 11, -3.5],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: { fontSize: 9, offset: [0, -10] }
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 1,
                        label: { fontSize: 9, offset: [-10, 0] }
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* ── Axis labels ──────────────────────────────────────────── */
        board.create('text', [10.5, -0.3, '<i>x</i>'], {
            fontSize: 11, fixed: true, highlight: false
        });
        board.create('text', [0.2, 4.1, '<i>y</i>'], {
            fontSize: 11, fixed: true, highlight: false
        });

        /* ── Colors ───────────────────────────────────────────────── */
        var COL_F = '#222222';
        var COL_G = '#2563EB';

        /* ── f(x) = sqrt(x) ──────────────────────────────────────── */
        board.create('functiongraph', [
            function(x) { return Math.sqrt(x); },
            0, 11
        ], {
            strokeColor: COL_F, strokeWidth: 1.8, fixed: true, highlight: false
        });

        /* ── g(x) = sqrt(x + 5) - 2 ─────────────────────────────── */
        board.create('functiongraph', [
            function(x) { return Math.sqrt(x + 5) - 2; },
            -5, 11
        ], {
            strokeColor: COL_G, strokeWidth: 1.5, fixed: true, highlight: false
        });

        /* ── Key points on f (no labels) ─────────────────────────── */
        var fPts = [[0, 0], [1, 1], [4, 2], [9, 3]];
        for (var i = 0; i < fPts.length; i++) {
            board.create('point', fPts[i], {
                name: '', size: 3, color: COL_F, fixed: true,
                highlight: false, showInfobox: false
            });
        }

        /* ── Key points on g (no labels) ─────────────────────────── */
        var gPts = [[-5, -2], [-4, -1], [-1, 0], [4, 1]];
        for (var j = 0; j < gPts.length; j++) {
            board.create('point', gPts[j], {
                name: '', size: 3, color: COL_G, fixed: true,
                highlight: false, showInfobox: false
            });
        }

        /* ── Function name labels ─────────────────────────────────── */
        board.create('text', [9.5, 3.3, 'f'], {
            fontSize: 12, color: COL_F, fixed: true, highlight: false,
            cssStyle: 'font-style:italic; font-weight:600;'
        });
        board.create('text', [9.5, 1.7, 'g'], {
            fontSize: 12, color: COL_G, fixed: true, highlight: false,
            cssStyle: 'font-style:italic; font-weight:600;'
        });
    </script>
</body>
</html>
