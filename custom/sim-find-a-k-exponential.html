<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphs of f(x) and g(x) — Find a and k</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 500px; margin: 0; padding: 6px; height: calc(100% - 12px); }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; height: 100%; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>

    <script>
        // ── Board ───────────────────────────────────────────────────────
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-5, 12, 6, -5],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 1 }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 1 }
                }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        // Axis labels
        board.create('text', [5.6, -0.6, '<i>x</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.25, 11.5, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false });

        var COL_F = '#222222';
        var COL_G = '#2563EB';
        var COL_ASYM = '#0EA5E9';

        // ── Functions ───────────────────────────────────────────────────
        function fFunc(x) { return Math.pow(1.5, x); }
        function gFunc(x) { return 5 * Math.pow(1.5, x) - 3; }

        // ── Curves ──────────────────────────────────────────────────────
        board.create('functiongraph', [fFunc, -5, 6], {
            strokeColor: COL_F, strokeWidth: 1.5, fixed: true, highlight: false
        });
        board.create('functiongraph', [gFunc, -5, 6], {
            strokeColor: COL_G, strokeWidth: 1.8, fixed: true, highlight: false
        });

        // ── Asymptote for g(x): y = -3 ─────────────────────────────────
        board.create('line', [[0, -3], [1, -3]], {
            strokeColor: COL_ASYM, strokeWidth: 1.0, dash: 2,
            fixed: true, highlight: false
        });

        board.create('text', [4.2, -2.4, '\\color{#0EA5E9}{y = -3}'], {
            fontSize: 11, useKatex: true, fixed: true, highlight: false
        });

        // ── Y-intercept points (no coordinate labels) ──────────────────
        board.create('point', [0, 1], {
            name: '', size: 4, color: COL_F, fixed: true, highlight: false, showInfobox: false
        });
        board.create('point', [0, 2], {
            name: '', size: 4, color: COL_G, fixed: true, highlight: false, showInfobox: false
        });

        // ── Curve labels ────────────────────────────────────────────────
        board.create('text', [4.0, 4, 'f(x) = \\left(\\tfrac{3}{2}\\right)^{\\!x}'], {
            fontSize: 12, color: COL_F, useKatex: true, fixed: true, highlight: false
        });
        board.create('text', [2.8, 9.5, '\\color{#2563EB}{g(x) = a\\!\\left(\\tfrac{3}{2}\\right)^{\\!x}\\!+ k}'], {
            fontSize: 12, useKatex: true, fixed: true, highlight: false
        });
    </script>
</body>
</html>
