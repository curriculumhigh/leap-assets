<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 300px; margin: 0; padding: 4px; height: calc(100% - 8px); box-sizing: border-box; }
        .board-wrapper { background: white; border-radius: 6px; padding: 6px; height: calc(100% - 12px); box-sizing: border-box; position: relative; }
        .label { position: absolute; top: 6px; left: 10px; font-size: 16px; font-weight: 600; color: #222; z-index: 10; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div class="board-wrapper">
        <div class="label">D</div>
        <div id="board"></div>
    </div>
</div>
<script>
var board = JXG.JSXGraph.initBoard('board', {
    boundingbox: [-5, 5, 5, -5], axis: true, keepAspectRatio: true,
    showNavigation: false, showCopyright: false,
    pan: { enabled: false }, zoom: { enabled: false },
    defaultAxes: {
        x: { strokeColor: '#444', strokeWidth: 1.0, lastArrow: { type: 2, size: 4 },
             ticks: { strokeColor: '#444', label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 2 } },
        y: { strokeColor: '#444', strokeWidth: 1.0, lastArrow: { type: 2, size: 4 },
             ticks: { strokeColor: '#444', label: { fontSize: 9 }, minorTicks: 0, ticksDistance: 2 } }
    },
    grid: { strokeColor: '#E5E7EB', strokeWidth: 0.3 }
});

// f reference (light gray)
var fPts = [[-4,-3],[-2,-1],[0,0],[2,2],[4,3]];
var fGliders = fPts.map(function(p) { return board.create('point', p, { visible: false, fixed: true }); });
board.create('curve', JXG.Math.Numerics.CardinalSpline(fGliders, 0.5), {
    strokeColor: '#BBBBBB', strokeWidth: 1.4, fixed: true, highlight: false
});
fPts.forEach(function(p) {
    board.create('point', p, { name: '', size: 1.5, color: '#BBBBBB',
        fixed: true, highlight: false, showInfobox: false });
});

// Candidate curve
var cPts = [[-4,-1],[-2,1],[0,2],[2,4],[4,5]];
var cGliders = cPts.map(function(p) { return board.create('point', p, { visible: false, fixed: true }); });
board.create('curve', JXG.Math.Numerics.CardinalSpline(cGliders, 0.5), {
    strokeColor: '#222', strokeWidth: 1.8, fixed: true, highlight: false
});
cPts.forEach(function(p) {
    board.create('point', p, { name: '', size: 2.5, color: '#222',
        fixed: true, highlight: false, showInfobox: false });
});
</script>
</body>
</html>
