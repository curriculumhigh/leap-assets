<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Function y = -2x</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: transparent; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="board"></div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-3, 5.5, 3, -5.5],
            axis: false,
            showNavigation: false, showCopyright: false,
            pan: { enabled: false }, zoom: { enabled: false }
        });

        var xMin = -3, xMax = 3, yMin = -5.5, yMax = 5.5;
        var i;
        for (i = Math.ceil(xMin); i <= Math.floor(xMax); i++) {
            board.create('line', [[i, 0], [i, 1]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4, fixed: true, highlight: false, straightFirst: true, straightLast: true
            });
        }
        for (i = -4; i <= 4; i += 2) {
            board.create('line', [[0, i], [1, i]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4, fixed: true, highlight: false, straightFirst: true, straightLast: true
            });
        }

        board.create('arrow', [[xMin, 0], [xMax, 0]], {
            strokeColor: '#444444', strokeWidth: 1.2, fixed: true, highlight: false, lastArrow: { type: 2, size: 6 }
        });
        board.create('arrow', [[0, yMin], [0, yMax]], {
            strokeColor: '#444444', strokeWidth: 1.2, fixed: true, highlight: false, lastArrow: { type: 2, size: 6 }
        });

        var xTicks = [-2, -1, 1, 2];
        for (i = 0; i < xTicks.length; i++) {
            board.create('text', [xTicks[i], -0.55, String(xTicks[i])], {
                fontSize: 11, color: '#444444', anchorX: 'middle', anchorY: 'top', fixed: true, highlight: false
            });
        }
        var yTicks = [-4, -2, 2, 4];
        for (i = 0; i < yTicks.length; i++) {
            board.create('text', [-0.35, yTicks[i], String(yTicks[i])], {
                fontSize: 11, color: '#444444', anchorX: 'right', anchorY: 'middle', fixed: true, highlight: false
            });
        }

        board.create('text', [2.7, -0.55, '<i>x</i>'], { fontSize: 14, color: '#444444', fixed: true, highlight: false });
        board.create('text', [0.2, 5.1, '<i>y</i>'], { fontSize: 14, color: '#444444', fixed: true, highlight: false });

        board.create('functiongraph', [function(x) { return -2 * x; }], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });

        var pts = [[-2, 4], [-1, 2], [0, 0], [1, -2], [2, -4]];
        for (i = 0; i < pts.length; i++) {
            board.create('point', pts[i], {
                name: '', size: 5, color: '#222222', fixed: true, highlight: false, showInfobox: false
            });
        }
    </script>
</body>
</html>
