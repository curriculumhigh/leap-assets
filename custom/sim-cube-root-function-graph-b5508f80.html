<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Root Function Graph</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: transparent; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="board"></div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-5.5, 9.5, 5.5, -9.5],
            axis: false, grid: false,
            showNavigation: false, showCopyright: false,
            pan: { enabled: false }, zoom: { enabled: false }
        });

        var xGridVals = [-4, -2, 2, 4];
        for (var i = 0; i < xGridVals.length; i++) {
            board.create('line', [[xGridVals[i], 0], [xGridVals[i], 1]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4, straightFirst: true, straightLast: true, fixed: true, highlight: false
            });
        }
        for (var g = -8; g <= 8; g++) {
            if (g === 0) continue;
            board.create('line', [[0, g], [1, g]], {
                strokeColor: '#D1D5DB', strokeWidth: 0.4, straightFirst: true, straightLast: true, fixed: true, highlight: false
            });
        }

        board.create('arrow', [[-5.3, 0], [5.3, 0]], {
            strokeColor: '#444444', strokeWidth: 1.2, firstArrow: { type: 2, size: 6 }, lastArrow: { type: 2, size: 6 }, fixed: true, highlight: false
        });
        board.create('arrow', [[0, -9.3], [0, 9.3]], {
            strokeColor: '#444444', strokeWidth: 1.2, firstArrow: { type: 2, size: 6 }, lastArrow: { type: 2, size: 6 }, fixed: true, highlight: false
        });

        var xTickVals = [-4, -2, 2, 4];
        for (var tx = 0; tx < xTickVals.length; tx++) {
            board.create('text', [xTickVals[tx], -0.7, String(xTickVals[tx])], {
                fontSize: 9, color: '#444444', anchorX: 'middle', anchorY: 'top', fixed: true, highlight: false
            });
        }
        for (var ty = -8; ty <= 8; ty++) {
            if (ty === 0) continue;
            board.create('text', [-0.45, ty, String(ty)], {
                fontSize: 9, color: '#444444', anchorX: 'right', anchorY: 'middle', fixed: true, highlight: false
            });
        }

        board.create('text', [5.0, -0.7, '<i>x</i>'], { fontSize: 12, color: '#444444', fixed: true, highlight: false });
        board.create('text', [0.3, 9.0, '<i>y</i>'], { fontSize: 12, color: '#444444', fixed: true, highlight: false });

        board.create('functiongraph', [function(x) { return -x * x * x / 8; }], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });

        var keyPoints = [[4, -8], [2, -1], [0, 0], [-2, 1], [-4, 8]];
        for (var p = 0; p < keyPoints.length; p++) {
            board.create('point', keyPoints[p], {
                name: '', size: 3, color: '#222222', fixed: true, highlight: false, showInfobox: false
            });
        }
    </script>
</body>
</html>
