<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of 1/x</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { width: 300px; height: 200px; margin: 0; padding: 6px; box-sizing: border-box; }
        .board-wrapper { background: white; border-radius: 8px; padding: 6px; height: 100%; box-sizing: border-box; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-6, 6, 6, -6],
            axis: true,
            grid: false,
            keepAspectRatio: false,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 2
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 2
                    }
                }
            }
        });

        board.create('functiongraph', [
            function(x) { return 1 / x; },
            0.05, 6
        ], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });

        board.create('functiongraph', [
            function(x) { return 1 / x; },
            -6, -0.05
        ], {
            strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false
        });
    </script>
</body>
</html>
