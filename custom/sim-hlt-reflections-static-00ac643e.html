<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #222; }
        .container { max-width: 720px; margin: 0; padding: 6px; height: calc(100% - 12px); box-sizing: border-box; }
        .panels { display: flex; gap: 12px; height: 100%; }
        .panel { flex: 1; display: flex; flex-direction: column; }
        .panel-title { text-align: center; font-size: 13px; padding: 4px; }
        .board-wrapper { background: white; border-radius: 8px; padding: 8px; flex: 1; box-sizing: border-box; }
        .board { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div class="panels">
        <div class="panel">
            <div class="panel-title" id="title-cubic"></div>
            <div class="board-wrapper"><div class="board" id="board1"></div></div>
        </div>
        <div class="panel">
            <div class="panel-title" id="title-parabola"></div>
            <div class="board-wrapper"><div class="board" id="board2"></div></div>
        </div>
    </div>
</div>
<script>
function kr(id, s) { katex.render(s, document.getElementById(id), { throwOnError: false }); }
kr('title-cubic', 'f(x) = x^3');
kr('title-parabola', 'f(x) = x^2');

var COL_F = '#2563EB';
var COL_FINV = '#DC2626';
var COL_REF = '#888888';

function makeBoard(id) {
    return JXG.JSXGraph.initBoard(id, {
        boundingbox: [-4.5, 4.5, 4.5, -4.5],
        axis: true, keepAspectRatio: true,
        showNavigation: false, showCopyright: false,
        pan: { enabled: false }, zoom: { enabled: false },
        defaultAxes: {
            x: { strokeColor: '#444444', strokeWidth: 1.0, lastArrow: { type: 2, size: 4 },
                 ticks: { strokeColor: '#444444', label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 2 } },
            y: { strokeColor: '#444444', strokeWidth: 1.0, lastArrow: { type: 2, size: 4 },
                 ticks: { strokeColor: '#444444', label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 2 } }
        },
        grid: { strokeColor: '#E5E7EB', strokeWidth: 0.3 }
    });
}

function addYEqualsX(board) {
    board.create('line', [[0, 0], [1, 1]], {
        strokeColor: COL_REF, strokeWidth: 0.9, dash: 2,
        fixed: true, highlight: false,
        point1: { visible: false }, point2: { visible: false }
    });
}

// ── Cubic panel: f(x) = x^3, f^-1(x) = cbrt(x) ────────────────────
var b1 = makeBoard('board1');
addYEqualsX(b1);
b1.create('functiongraph', [function(x) { return x*x*x; }, -1.6, 1.6],
    { strokeColor: COL_F, strokeWidth: 1.8, fixed: true, highlight: false });
b1.create('functiongraph', [function(x) { return Math.cbrt(x); }, -4, 4],
    { strokeColor: COL_FINV, strokeWidth: 1.8, fixed: true, highlight: false });

// ── Parabola panel: f(x) = x^2, reflection = sideways parabola ────
var b2 = makeBoard('board2');
addYEqualsX(b2);
b2.create('functiongraph', [function(x) { return x*x; }, -2.1, 2.1],
    { strokeColor: COL_F, strokeWidth: 1.8, fixed: true, highlight: false });
// Sideways parabola: x = y^2, drawn parametrically as (t^2, t) for t in [-2.1, 2.1]
b2.create('curve', [function(t) { return t*t; }, function(t) { return t; }, -2.1, 2.1],
    { strokeColor: COL_FINV, strokeWidth: 1.8, fixed: true, highlight: false });
</script>
</body>
</html>
