<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 500px; margin: 0; padding: 6px; height: calc(100% - 12px); box-sizing: border-box; }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; height: calc(100% - 20px); box-sizing: border-box; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div class="container"><div class="board-wrapper"><div id="board"></div></div></div>
<script>
var board = JXG.JSXGraph.initBoard('board', {
    boundingbox: [-5, 5, 5, -5], axis: true, keepAspectRatio: true,
    showNavigation: false, showCopyright: false,
    pan: { enabled: false }, zoom: { enabled: false },
    defaultAxes: {
        x: { strokeColor: '#444', strokeWidth: 1.2, lastArrow: { type: 2, size: 5 },
             ticks: { strokeColor: '#444', label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 1 } },
        y: { strokeColor: '#444', strokeWidth: 1.2, lastArrow: { type: 2, size: 5 },
             ticks: { strokeColor: '#444', label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 1 } }
    },
    grid: { strokeColor: '#E5E7EB', strokeWidth: 0.3 }
});

var fPts = [[-4,-3],[-2,-1],[0,0],[2,2],[4,3]];
var fGliders = fPts.map(function(p) { return board.create('point', p, { visible: false, fixed: true }); });
board.create('curve', JXG.Math.Numerics.CardinalSpline(fGliders, 0.5), {
    strokeColor: '#2563EB', strokeWidth: 1.8, fixed: true, highlight: false
});
fPts.forEach(function(p) {
    board.create('point', p, { name: '', size: 2.5, color: '#2563EB',
        fixed: true, highlight: false, showInfobox: false });
});
board.create('text', [4.0, 3.6, 'f'], {
    useKatex: true, fontSize: 13, color: '#2563EB', fixed: true, highlight: false
});
</script>
</body>
</html>
