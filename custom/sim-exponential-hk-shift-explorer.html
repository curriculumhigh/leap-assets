<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential Shift Explorer: y = a(2)^(x−h) + k</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 700px; margin: 0; padding: 6px; height: calc(100% - 12px); }
        .sim-layout { display: flex; gap: 12px; height: 100%; }
        .left-panel {
            width: 200px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column; gap: 14px;
        }
        .panel-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: #888; margin-bottom: 6px;
        }
        .slider-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
        }
        .slider-input {
            flex: 1; -webkit-appearance: none; appearance: none;
            height: 5px; border-radius: 3px; background: #e5e7eb; outline: none;
        }
        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 15px; height: 15px; border-radius: 50%; cursor: pointer;
            background: #2563EB;
        }
        .slider-val {
            font-size: 14px; font-weight: 600; color: #2563EB;
            font-variant-numeric: tabular-nums; width: 32px; text-align: right;
        }
        .equation-section { border-top: 1px solid #e5e7eb; padding-top: 12px; }
        .equation-display { min-height: 28px; margin-bottom: 4px; }
        .readout-section { border-top: 1px solid #e5e7eb; padding-top: 12px; }
        .hint-text { font-size: 12px; color: #777; line-height: 1.5; }
        .warning-msg {
            line-height: 1.5;
            background: #FEF2F2; border: 1px solid #FECACA; border-radius: 6px;
            padding: 10px 12px; display: none;
        }
        .warning-title { font-size: 13px; font-weight: 700; color: #DC2626; margin-bottom: 4px; }
        .warning-body { font-size: 12px; color: #777; }
        .board-wrapper { flex: 1; background: white; border-radius: 8px; padding: 10px; }
        #board { width: 100%; height: 100%; }
        .coord-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="panel-section">
                    <div class="panel-label">Parameters</div>
                    <div class="slider-row">
                        <span style="font-size: 13px; color: #2563EB; font-weight: 600; width: 12px;" id="lbl-a"></span>
                        <input type="range" id="slider-a" class="slider-input" min="-5" max="5" step="0.1" value="3">
                        <span class="slider-val" id="val-a">3.0</span>
                    </div>
                    <div class="slider-row">
                        <span style="font-size: 13px; color: #2563EB; font-weight: 600; width: 12px;" id="lbl-h"></span>
                        <input type="range" id="slider-h" class="slider-input" min="-4" max="6" step="1" value="1">
                        <span class="slider-val" id="val-h">1</span>
                    </div>
                    <div class="slider-row">
                        <span style="font-size: 13px; color: #2563EB; font-weight: 600; width: 12px;" id="lbl-k"></span>
                        <input type="range" id="slider-k" class="slider-input" min="-10" max="10" step="1" value="-5">
                        <span class="slider-val" id="val-k">-5</span>
                    </div>
                </div>
                <div class="panel-section equation-section">
                    <div class="panel-label">Equation</div>
                    <div class="equation-display" id="equation"></div>
                </div>
                <div class="panel-section readout-section">
                    <div class="hint-text" id="hint-msg">Observe the domain, <i>y</i>-intercept, and range as you change each parameter.</div>
                    <div class="warning-msg" id="warning">
                        <div class="warning-title">a = 0 is not valid</div>
                        <div class="warning-body">When a = 0 the function becomes a constant, not an exponential function.</div>
                    </div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>
    <div class="coord-tooltip" id="tooltip"></div>

    <script>
        // ── Panel KaTeX labels ────────────────────────────────────────────
        katex.render('a', document.getElementById('lbl-a'), { throwOnError: false });
        katex.render('h', document.getElementById('lbl-h'), { throwOnError: false });
        katex.render('k', document.getElementById('lbl-k'), { throwOnError: false });

        // ── Board ─────────────────────────────────────────────────────────
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-6, 20, 7, -20],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 1 }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: { strokeColor: '#444444', label: { fontSize: 11 }, minorTicks: 0, ticksDistance: 2 }
                }
            },
            grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 }
        });

        board.create('text', [6.6, -0.5, '<i>x</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.3, 19.5, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false });

        var aVal = 3;
        var hVal = 1;
        var kVal = -5;

        // ── Reference curve y = 2^x (dashed gray) ────────────────────────
        board.create('functiongraph', [
            function(x) { return Math.pow(2, x); }
        ], { strokeColor: '#999999', strokeWidth: 1.2, dash: 2, fixed: true, highlight: false });

        board.create('text', [2.8, 9, 'y = 2^x'], {
            fontSize: 11, color: '#999999', useKatex: true, fixed: true, highlight: false, anchorX: 'right'
        });

        // ── Transformed curve y = a(2)^{x-h} + k (primary, blue) ────────
        var COL_T = '#2563EB';

        var curve = board.create('functiongraph', [
            function(x) { return aVal * Math.pow(2, x - hVal) + kVal; }
        ], { strokeColor: COL_T, strokeWidth: 1.8, fixed: true });

        // ── Asymptote y = k ───────────────────────────────────────────────
        var asymPt1 = board.create('point', [-6, function() { return kVal; }], { visible: false });
        var asymPt2 = board.create('point', [7, function() { return kVal; }], { visible: false });
        board.create('segment', [asymPt1, asymPt2], {
            strokeColor: '#0EA5E9', strokeWidth: 1.0, dash: 2,
            fixed: true, highlight: false
        });

        board.create('text', [
            function() { return 5.5; },
            function() { return kVal + 0.6; },
            function() { return '\\color{#0EA5E9}{y = ' + kVal + '}'; }
        ], { fontSize: 11, useKatex: true, fixed: true, highlight: false });

        // ── Y-intercept point (dynamic, tooltip on hover) ─────────────────
        var yIntPt = board.create('point', [
            0,
            function() { return aVal * Math.pow(2, -hVal) + kVal; }
        ], {
            name: '', size: 5, color: COL_T, fixed: true,
            showInfobox: false, highlight: true,
            highlightFillColor: COL_T, highlightStrokeColor: COL_T,
            visible: function() { return aVal !== 0; }
        });

        var tooltipEl = document.getElementById('tooltip');
        var boardContainer = document.getElementById('board');

        function gcd(a, b) { while (b) { var t = b; b = a % b; a = t; } return a; }

        function formatValKatex(v) {
            if (Math.abs(v - Math.round(v)) < 0.001) return String(Math.round(v));
            var sign = v < 0 ? '-' : '';
            var absV = Math.abs(v);
            var denoms = [2, 4, 8, 16];
            for (var i = 0; i < denoms.length; i++) {
                var d = denoms[i];
                var n = Math.round(absV * d);
                if (Math.abs(absV - n / d) < 0.001) {
                    var g = gcd(n, d);
                    return sign + '\\tfrac{' + (n / g) + '}{' + (d / g) + '}';
                }
            }
            return v.toFixed(2);
        }

        yIntPt.on('over', function() {
            var yVal = aVal * Math.pow(2, -hVal) + kVal;
            var latex = '\\color{' + COL_T + '}{\\left(0,\\, ' + formatValKatex(yVal) + '\\right)}';
            katex.render(latex, tooltipEl, { throwOnError: false });
            tooltipEl.style.borderColor = COL_T;
            tooltipEl.style.display = 'block';
            var rect = boardContainer.getBoundingClientRect();
            var coords = new JXG.Coords(JXG.COORDS_BY_USER, [0, yVal], board);
            tooltipEl.style.left = (coords.scrCoords[1] + rect.left + 14) + 'px';
            tooltipEl.style.top = (coords.scrCoords[2] + rect.top - 28) + 'px';
        });
        yIntPt.on('out', function() {
            tooltipEl.style.display = 'none';
        });

        // ── Slider sync ───────────────────────────────────────────────────
        var sliderA = document.getElementById('slider-a');
        var sliderH = document.getElementById('slider-h');
        var sliderK = document.getElementById('slider-k');

        function updateAll() {
            aVal = parseFloat(sliderA.value);
            aVal = Math.round(aVal * 10) / 10;
            hVal = parseInt(sliderH.value);
            kVal = parseInt(sliderK.value);

            document.getElementById('val-a').textContent = aVal.toFixed(1);
            document.getElementById('val-h').textContent = hVal;
            document.getElementById('val-k').textContent = kVal;

            // Equation in panel
            var aStr = aVal === 0 ? '0' : (aVal === 1 ? '' : (aVal === -1 ? '-' : aVal.toFixed(1)));
            var hStr = hVal === 0 ? 'x' : (hVal > 0 ? 'x - ' + hVal : 'x + ' + (-hVal));
            var kStr = kVal === 0 ? '' : (kVal > 0 ? ' + ' + kVal : ' - ' + (-kVal));
            var eqStr;
            if (aVal === 0) {
                eqStr = 'y = ' + kVal;
            } else {
                eqStr = 'y = ' + aStr + '(2)^{' + hStr + '}' + kStr;
            }
            katex.render('\\color{#2563EB}{' + eqStr + '}', document.getElementById('equation'), { throwOnError: false });

            // Hide curve elements and show warning when a = 0
            var isZero = (aVal === 0);
            curve.setAttribute({ visible: !isZero });
            document.getElementById('hint-msg').style.display = isZero ? 'none' : 'block';
            document.getElementById('warning').style.display = isZero ? 'block' : 'none';

            tooltipEl.style.display = 'none';
            board.update();
        }

        sliderA.addEventListener('input', updateAll);
        sliderH.addEventListener('input', updateAll);
        sliderK.addEventListener('input', updateAll);

        updateAll();
    </script>
</body>
</html>
