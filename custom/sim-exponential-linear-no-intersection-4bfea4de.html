<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential and Linear — No Intersection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            height: 100%; background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 700px; margin: 0; padding: 6px;
            height: calc(100% - 12px);
        }
        .sim-layout {
            display: flex; gap: 12px; height: 100%;
        }
        .left-panel {
            width: 175px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column; gap: 14px;
        }
        .panel-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.5px; color: #888; margin-bottom: 6px;
        }
        .func-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px;
        }
        .func-swatch {
            width: 20px; height: 3px; border-radius: 2px; flex-shrink: 0;
        }
        .func-label { min-height: 24px; }
        .board-wrapper {
            flex: 1; background: white; border-radius: 8px;
            padding: 10px; height: calc(100% - 20px);
        }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="panel-section">
                    <div class="panel-label">Functions</div>
                    <div class="func-row">
                        <div class="func-swatch" style="background: #222222;"></div>
                        <div class="func-label" id="label-f1"></div>
                    </div>
                    <div class="func-row">
                        <div class="func-swatch" style="background: #2563EB;"></div>
                        <div class="func-label" id="label-f2"></div>
                    </div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>

    <script>
        // Render panel labels
        katex.render('y = 5^{x+2}', document.getElementById('label-f1'), { throwOnError: false });
        katex.render('y = x - 3', document.getElementById('label-f2'), { throwOnError: false });

        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-5, 30, 4, -8],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 5
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels
        board.create('text', [3.6, -1.2, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.25, 29, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        // Primary curve: y = 5^(x+2)
        board.create('functiongraph', [
            function(x) { return Math.pow(5, x + 2); }
        ], {
            strokeColor: '#222222', strokeWidth: 1.8,
            fixed: true, highlight: false
        });

        // Secondary curve: y = x - 3
        board.create('functiongraph', [
            function(x) { return x - 3; }
        ], {
            strokeColor: '#2563EB', strokeWidth: 1.5,
            fixed: true, highlight: false
        });
    </script>
</body>
</html>
