<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphs of y₁ = √(6x) and y₂ = −√(6x)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            height: 100%; background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 500px; margin: 0; padding: 6px;
            height: calc(100% - 12px);
        }
        .sim-layout {
            display: flex; gap: 10px; height: 100%;
        }
        .left-panel {
            width: 120px; flex-shrink: 0;
            background: white; border-radius: 8px; padding: 14px 12px;
            display: flex; flex-direction: column; justify-content: center; gap: 18px;
        }
        .legend-item {
            display: flex; align-items: center; gap: 8px;
        }
        .legend-swatch {
            width: 22px; height: 3px; border-radius: 2px; flex-shrink: 0;
        }
        .legend-label {
            font-size: 14px; line-height: 1.3;
        }
        .board-wrapper {
            flex: 1; background: white; border-radius: 8px; padding: 10px;
            height: calc(100% - 20px);
        }
        #board {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sim-layout">
            <div class="left-panel">
                <div class="legend-item">
                    <div class="legend-swatch" style="background: #222222;"></div>
                    <div class="legend-label" id="legend-y1"></div>
                </div>
                <div class="legend-item">
                    <div class="legend-swatch" style="background: #2563EB;"></div>
                    <div class="legend-label" id="legend-y2"></div>
                </div>
            </div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>

    <script>
        // Render panel labels with KaTeX
        katex.render('y_1 = \\sqrt{6x}', document.getElementById('legend-y1'), { throwOnError: false });
        katex.render('y_2 = -\\sqrt{6x}', document.getElementById('legend-y2'), { throwOnError: false });

        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-1.5, 7.5, 8, -7.5],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: { fontSize: 11, offset: [0, -14] }
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: { fontSize: 11, offset: [-14, 0] }
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [7.6, -0.55, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.25, 7.1, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        // y₁ = √(6x)  — primary curve (dark)
        board.create('functiongraph', [
            function(x) { return (x >= 0) ? Math.sqrt(6 * x) : NaN; },
            0, 8
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        // y₂ = −√(6x) — secondary curve (blue)
        board.create('functiongraph', [
            function(x) { return (x >= 0) ? -Math.sqrt(6 * x) : NaN; },
            0, 8
        ], {
            strokeColor: '#2563EB',
            strokeWidth: 1.5,
            fixed: true,
            highlight: false
        });

        // Curve name labels on the board (name only, no rule)
        board.create('text', [6.2, 5.8, 'y_1'], {
            fontSize: 13,
            color: '#222222',
            useKatex: true,
            fixed: true,
            highlight: false
        });

        board.create('text', [6.2, -5.8, 'y_2'], {
            fontSize: 13,
            color: '#2563EB',
            useKatex: true,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
