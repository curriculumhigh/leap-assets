<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #222; }
        .container { max-width: 500px; margin: 0; padding: 6px; height: calc(100% - 12px); box-sizing: border-box; }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; height: calc(100% - 20px); box-sizing: border-box; }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div class="board-wrapper">
        <div id="board"></div>
    </div>
</div>
<script>
var board = JXG.JSXGraph.initBoard('board', {
    boundingbox: [-5, 5, 5, -5],
    axis: true, keepAspectRatio: true,
    showNavigation: false, showCopyright: false,
    pan: { enabled: false }, zoom: { enabled: false },
    defaultAxes: {
        x: { strokeColor: '#444444', strokeWidth: 1.2,
             lastArrow: { type: 2, size: 5 },
             ticks: { strokeColor: '#444444', label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 1 } },
        y: { strokeColor: '#444444', strokeWidth: 1.2,
             lastArrow: { type: 2, size: 5 },
             ticks: { strokeColor: '#444444', label: { fontSize: 10 }, minorTicks: 0, ticksDistance: 1 } }
    },
    grid: { strokeColor: '#E5E7EB', strokeWidth: 0.3 }
});

// y = x dashed
board.create('line', [[0, 0], [1, 1]], {
    strokeColor: '#888888', strokeWidth: 1.0, dash: 2,
    fixed: true, highlight: false,
    point1: { visible: false }, point2: { visible: false }
});
board.create('text', [4.0, 4.6, 'y = x'], {
    useKatex: true, fontSize: 11, color: '#888888',
    fixed: true, highlight: false
});

// f(x) = x^2 over the restricted range (blue)
board.create('functiongraph', [function(x) { return x * x; }, -2.24, 0], {
    strokeColor: '#2563EB', strokeWidth: 1.8, fixed: true, highlight: false
});

// f^-1(x) = ±sqrt(x) (red)
board.create('functiongraph', [function(x) { return -Math.sqrt(x); }, 0, 5], {
    strokeColor: '#DC2626', strokeWidth: 1.8, fixed: true, highlight: false
});

// Endpoint dots at the origin (both curves share it)
board.create('point', [0, 0], { name: '', size: 3, color: '#222222', fixed: true, highlight: false });

// Labels: f(x) near the parabola, f^-1(x) near the radical
board.create('text', [-3.5, 3.7, 'f(x) = x^2'], { useKatex: true, fontSize: 12, color: '#2563EB', fixed: true, highlight: false });
board.create('text', [3.2, -2.4, 'f^{-1}(x) = -\\sqrt{x}'], { useKatex: true, fontSize: 12, color: '#DC2626', fixed: true, highlight: false });
</script>
</body>
</html>
