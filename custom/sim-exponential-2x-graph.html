<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of p(x) = 2^x</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            height: 100%; background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 6px;
            height: calc(100% - 12px);
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 10px;
            height: calc(100% - 20px);
        }
        #board {
            width: 100%;
            height: 100%;
        }
        .coord-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <div class="coord-tooltip" id="tooltip"></div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-4.5, 12, 4.5, -2],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 2
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels
        board.create('text', [4.1, -0.6, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.25, 11.5, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        var COL = '#222222';

        // Curve: p(x) = 2^x
        board.create('functiongraph', [
            function(x) { return Math.pow(2, x); }
        ], {
            strokeColor: COL,
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        // Function label
        board.create('text', [2.9, 7, 'p(x) = 2^x'], {
            fontSize: 13, color: COL, useKatex: true,
            fixed: true, highlight: false, anchorX: 'left'
        });

        // ── Tooltip infrastructure ──────────────────────────────────────
        var tooltip = document.getElementById('tooltip');
        var boardContainer = document.getElementById('board');

        function formatValKatex(v) {
            var absV = Math.abs(v);
            var sign = v < 0 ? '-' : '';
            if (Math.abs(absV - 1/4) < 0.001) return sign + '\\tfrac{1}{4}';
            if (Math.abs(absV - 1/2) < 0.001) return sign + '\\tfrac{1}{2}';
            if (Math.abs(v - Math.round(v)) < 0.001) return String(Math.round(v));
            return v.toFixed(2);
        }

        function showTooltip(pt, color) {
            var xCoord = pt.X();
            var yCoord = pt.Y();
            var latex = '\\color{' + color + '}{\\left(' + formatValKatex(xCoord) + ',\\,' + formatValKatex(yCoord) + '\\right)}';

            katex.render(latex, tooltip, { throwOnError: false });
            tooltip.style.borderColor = color;
            tooltip.style.display = 'block';

            var rect = boardContainer.getBoundingClientRect();
            var coords = new JXG.Coords(JXG.COORDS_BY_USER, [xCoord, yCoord], board);
            var sx = coords.scrCoords[1] + rect.left;
            var sy = coords.scrCoords[2] + rect.top;
            tooltip.style.left = (sx + 14) + 'px';
            tooltip.style.top = (sy - 28) + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        // ── Key points ──────────────────────────────────────────────────
        var xVals = [-2, -1, 0, 1, 2];

        xVals.forEach(function(xv) {
            var yv = Math.pow(2, xv);
            var pt = board.create('point', [xv, yv], {
                name: '',
                size: 5,
                color: COL,
                fixed: true,
                showInfobox: false,
                highlight: true,
                highlightFillColor: COL,
                highlightStrokeColor: COL
            });
            pt.on('over', function() { showTooltip(pt, COL); });
            pt.on('out', function() { hideTooltip(); });
        });
    </script>
</body>
</html>
