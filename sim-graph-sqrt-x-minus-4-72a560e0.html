<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of sqrt(x) - 4</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 300px; margin: 0; padding: 4px; height: calc(100% - 8px); }
        .board-wrapper { background: white; border-radius: 6px; padding: 6px; height: calc(100% - 12px); }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-3, 2.5, 23, -6.5],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 5 },
                    ticks: {
                        strokeColor: 'transparent',
                        strokeWidth: 0,
                        tickEndings: [0, 0],
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 4,
                        label: { fontSize: 10, color: '#444444', anchorX: 'middle', offset: [0, -12] }
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 5 },
                    ticks: {
                        strokeColor: 'transparent',
                        strokeWidth: 0,
                        tickEndings: [0, 0],
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: { fontSize: 10, color: '#444444', anchorY: 'middle', offset: [-5, 0] }
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* Axis labels */
        board.create('text', [22.2, -0.5, '<i>x</i>'], { fontSize: 12, fixed: true, highlight: false, color: '#444444' });
        board.create('text', [0.4, 2.1, '<i>y</i>'], { fontSize: 12, fixed: true, highlight: false, color: '#444444' });

        /* Function: f(x) = sqrt(x) - 4 */
        board.create('functiongraph', [
            function(x) { return (x >= 0) ? Math.sqrt(x) - 4 : NaN; }
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
