<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Plot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden; height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 500px; margin: 0 auto; padding: 6px;
        }
        .board-wrapper {
            background: white; border-radius: 8px; padding: 10px;
        }
        #board {
            width: 480px; height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-0.8, 95, 5.5, -12],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 9
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels
        board.create('text', [5.2, -3, '<i>n</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.15, 93, function() { return 'a'; }], {
            fontSize: 14, fixed: true, highlight: false,
            cssStyle: 'font-style: italic;'
        });
        board.create('text', [0.32, 89, function() { return 'n'; }], {
            fontSize: 10, fixed: true, highlight: false,
            cssStyle: 'font-style: italic;'
        });

        // Data points and labels
        var pts = [
            { n: 1, a: 81, offX: 0.18, offY: 4 },
            { n: 2, a: 54, offX: 0.18, offY: 4 },
            { n: 3, a: 36, offX: 0.18, offY: 4 },
            { n: 4, a: 24, offX: 0.18, offY: -6 }
        ];

        for (var i = 0; i < pts.length; i++) {
            var p = pts[i];

            // Point marker — smaller filled circle
            board.create('point', [p.n, p.a], {
                name: '',
                size: 3,
                color: '#222222',
                fixed: true,
                highlight: false,
                showInfobox: false
            });

            // Coordinate label
            board.create('text', [p.n + p.offX, p.a + p.offY,
                '(' + p.n + ',\\,' + p.a + ')'], {
                useKatex: true,
                fontSize: 13,
                color: '#222222',
                fixed: true,
                highlight: false,
                anchorX: 'left',
                anchorY: 'middle'
            });
        }
    </script>
</body>
</html>
