<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Root of 3x</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 300px; margin: 0; padding: 0; height: 100%; }
        .board-wrapper { background: white; border-radius: 8px; padding: 6px; width: 288px; height: 194px; }
        #board { width: 288px; height: 188px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-4.5, 4, 4.5, -4],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 1,
                        label: { fontSize: 9, color: '#444444', offset: [0, -10] },
                        drawZero: false
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 1,
                        label: { fontSize: 9, color: '#444444', offset: [-12, 0] },
                        drawZero: false
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [4.1, -0.45, '<i>x</i>'], { fontSize: 12, fixed: true, highlight: false, color: '#222222' });
        board.create('text', [0.2, 3.6, '<i>y</i>'], { fontSize: 12, fixed: true, highlight: false, color: '#222222' });

        // f(x) = cbrt(3x)
        board.create('functiongraph', [
            function(x) {
                var val = 3 * x;
                return (val >= 0) ? Math.pow(val, 1 / 3) : -Math.pow(-val, 1 / 3);
            },
            -4.5, 4.5
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        // Origin key point
        board.create('point', [0, 0], {
            name: '',
            size: 3,
            color: '#222222',
            fixed: true,
            highlight: false,
            showInfobox: false
        });
    </script>
</body>
</html>
