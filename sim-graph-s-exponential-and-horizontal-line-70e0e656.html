<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph S — 3^x and y=5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden; height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 450px; margin: 0 auto; padding: 6px;
        }
        .board-wrapper {
            background: white; border-radius: 8px; padding: 10px;
            display: inline-block;
        }
        #board {
            width: 300px; height: 200px;
        }
        .coord-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <div class="coord-tooltip" id="tooltip"></div>

    <script>
        var COL_A = '#222222';
        var COL_LINE = '#2563EB';

        // Board: 300px × 200px
        // 30 px per unit → x-range = 10, y-range = 6.667
        // x: -3.5 to 6.5 (10 units), y: -1 to 5.667 (6.667 units)
        // This guarantees perfectly square grid cells.
        var xMin = -3.5, xMax = 6.5;
        var yMin = -1, yMax = yMin + (200 / 30); // = 5.6667

        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [xMin, yMax, xMax, yMin],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels — near arrow tips
        board.create('text', [6.1, -0.35, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.15, 5.3, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        // ── Curve A: 3^x ────────────────────────────────────────────────
        board.create('functiongraph', [
            function(x) { return Math.pow(3, x); }
        ], {
            strokeColor: COL_A, strokeWidth: 1.8, fixed: true, highlight: false
        });

        // Label "A" — placed in clear space along the rising curve
        board.create('text', [1.9, 4.2, 'A'], {
            fontSize: 13, color: COL_A, fixed: true, highlight: false,
            cssStyle: 'font-weight:600; font-style:italic'
        });

        // ── Horizontal line: y = 5 ──────────────────────────────────────
        board.create('functiongraph', [
            function(x) { return 5; }
        ], {
            strokeColor: COL_LINE, strokeWidth: 1.5, fixed: true, highlight: false
        });

        // Label y = 5 — placed to the right, clear of intersection
        board.create('text', [4.2, 5.35, 'y = 5'], {
            fontSize: 12, color: COL_LINE, fixed: true, highlight: false,
            useKatex: true
        });

        // ── Intersection point: 3^x = 5  →  x = log_3(5) ≈ 1.465 ──────
        var xInt = Math.log(5) / Math.log(3);

        var intPt = board.create('point', [xInt, 5], {
            name: '', size: 5, color: COL_A, fixed: true,
            showInfobox: false, highlight: true,
            highlightFillColor: COL_A, highlightStrokeColor: COL_A
        });

        // ── Custom KaTeX tooltip on hover ───────────────────────────────
        var tooltip = document.getElementById('tooltip');
        var boardContainer = document.getElementById('board');

        function showTooltip(pt, color) {
            var latex = '\\color{' + color + '}{\\left(\\log_3 5,\\, 5\\right)}';
            katex.render(latex, tooltip, { throwOnError: false });
            tooltip.style.borderColor = color;
            tooltip.style.display = 'block';
            var rect = boardContainer.getBoundingClientRect();
            var coords = new JXG.Coords(JXG.COORDS_BY_USER, [pt.X(), pt.Y()], board);
            var sx = coords.scrCoords[1] + rect.left;
            var sy = coords.scrCoords[2] + rect.top;
            tooltip.style.left = (sx + 14) + 'px';
            tooltip.style.top = (sy - 28) + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        intPt.on('over', function() { showTooltip(intPt, COL_A); });
        intPt.on('out', function() { hideTooltip(); });
    </script>
</body>
</html>
