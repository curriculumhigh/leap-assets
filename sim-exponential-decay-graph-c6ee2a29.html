<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential Decay Graph</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            width: 300px;
            height: 200px;
            margin: 0 auto;
            padding: 0;
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 6px;
            width: calc(100% - 12px);
            height: calc(100% - 12px);
        }
        #board {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-6, 8, 10, -6],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 2
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 2
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* Axis labels near arrow tips */
        board.create('text', [9.5, -0.5, '<i>x</i>'], {
            fontSize: 12, fixed: true, highlight: false
        });
        board.create('text', [0.3, 7.5, '<i>y</i>'], {
            fontSize: 12, fixed: true, highlight: false
        });

        /* f(x) = 3(0.75)^(x+1) - 4 */
        board.create('functiongraph', [
            function(x) {
                return 3 * Math.pow(0.75, x + 1) - 4;
            }
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
