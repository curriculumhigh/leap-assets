<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphs of f(x) and g(x)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 500px; margin: 0; padding: 6px; }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; }
        #board { width: 480px; height: 280px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-3, 18, 4, -6],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 2
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [3.6, -0.8, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.2, 17.2, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        // ── Curve colors ────────────────────────────────────────────────
        var COL_F = '#222222';
        var COL_G = '#2563EB';

        // ── f(x) = 0.5 · 5^x ───────────────────────────────────────────
        board.create('functiongraph', [
            function(x) { return 0.5 * Math.pow(5, x); }
        ], {
            strokeColor: COL_F,
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        // ── g(x) = 2 · 5^{x-1} - 3 ────────────────────────────────────
        board.create('functiongraph', [
            function(x) { return 2 * Math.pow(5, x - 1) - 3; }
        ], {
            strokeColor: COL_G,
            strokeWidth: 1.5,
            fixed: true,
            highlight: false
        });

        // ── Function labels ─────────────────────────────────────────────
        // f(x) label — placed close to the curve
        board.create('text', [1.3, 11.5, 'f(x)'], {
            fontSize: 13,
            color: COL_F,
            useKatex: true,
            fixed: true,
            highlight: false
        });

        // g(x) label — placed close to curve
        board.create('text', [2.6, 7, 'g(x)'], {
            fontSize: 13,
            color: COL_G,
            useKatex: true,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
