<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential Decay — Three Functions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 550px; margin: 0; padding: 6px; height: calc(100% - 12px); }
        .board-wrapper { background: white; border-radius: 8px; padding: 10px; height: calc(100% - 20px); }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-2.5, 10, 5.5, -8],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 11 },
                        minorTicks: 0,
                        ticksDistance: 2
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels
        board.create('text', [5.1, -0.5, '<i>x</i>'], { fontSize: 14, fixed: true, highlight: false });
        board.create('text', [0.2, 9.5, '<i>y</i>'], { fontSize: 14, fixed: true, highlight: false });

        // Colors
        var COL_F = '#222222';
        var COL_G = '#2563EB';
        var COL_H = '#059669';

        // f(x) = (1/3)^x
        board.create('functiongraph', [
            function(x) { return Math.pow(1 / 3, x); }
        ], { strokeColor: COL_F, strokeWidth: 1.8, fixed: true, highlight: false });

        // g(x) = 4 * (1/3)^x
        board.create('functiongraph', [
            function(x) { return 4 * Math.pow(1 / 3, x); }
        ], { strokeColor: COL_G, strokeWidth: 1.5, fixed: true, highlight: false });

        // h(x) = -4 * (1/3)^x
        board.create('functiongraph', [
            function(x) { return -4 * Math.pow(1 / 3, x); }
        ], { strokeColor: COL_H, strokeWidth: 1.5, fixed: true, highlight: false });

        // Function labels in KaTeX
        board.create('text', [-2, 5.2, 'f(x)'], {
            fontSize: 13, color: COL_F, useKatex: true, fixed: true, highlight: false
        });

        board.create('text', [1.2, 3.2, 'g(x)'], {
            fontSize: 13, color: COL_G, useKatex: true, fixed: true, highlight: false
        });

        board.create('text', [1.2, -3.2, 'h(x)'], {
            fontSize: 13, color: COL_H, useKatex: true, fixed: true, highlight: false
        });
    </script>
</body>
</html>
