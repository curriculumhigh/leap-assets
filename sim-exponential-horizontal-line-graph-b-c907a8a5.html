<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph B — Exponential and Horizontal Line</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; overflow: hidden; height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 320px; margin: 0 auto; padding: 6px;
        }
        .board-wrapper {
            background: white; border-radius: 8px; padding: 10px;
        }
        #board {
            width: 300px; height: 200px;
        }
        .coord-tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <div class="coord-tooltip" id="tooltip"></div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-2, 9, 6, -1],
            axis: true,
            keepAspectRatio: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                },
                y: {
                    strokeColor: '#444444', strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        label: { fontSize: 10 },
                        minorTicks: 0,
                        ticksDistance: 1
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // ── Axis labels — placed near arrow tips ────────────────────────
        board.create('text', [
            function() { return board.getBoundingBox()[2] - 0.4; },
            -0.55,
            '<i>x</i>'
        ], {
            fontSize: 13, fixed: true, highlight: false, anchorX: 'right'
        });

        board.create('text', [
            0.3,
            function() { return board.getBoundingBox()[1] - 0.4; },
            '<i>y</i>'
        ], {
            fontSize: 13, fixed: true, highlight: false
        });

        // ── Colors ──────────────────────────────────────────────────────
        var COL_EXP = '#222222';
        var COL_LINE = '#2563EB';

        // ── Exponential curve: y = 3^(x-1) ─────────────────────────────
        board.create('functiongraph', [
            function(x) { return Math.pow(3, x - 1); }
        ], {
            strokeColor: COL_EXP, strokeWidth: 1.8,
            fixed: true, highlight: false
        });

        // ── Horizontal line: y = 5 ─────────────────────────────────────
        board.create('functiongraph', [
            function(x) { return 5; }
        ], {
            strokeColor: COL_LINE, strokeWidth: 1.5,
            fixed: true, highlight: false
        });

        // Label for y = 5 — placed to the right, clear of intersection
        board.create('text', [4.8, 5.55, 'y = 5'], {
            fontSize: 12, color: COL_LINE, fixed: true, highlight: false,
            useKatex: true
        });

        // ── Intersection point ──────────────────────────────────────────
        // 3^(x-1) = 5  →  x = 1 + ln(5)/ln(3) ≈ 2.465
        var xInt = 1 + Math.log(5) / Math.log(3);
        var yInt = 5;

        var intPt = board.create('point', [xInt, yInt], {
            name: '', size: 4, color: COL_EXP, fixed: true,
            showInfobox: false, highlight: true,
            highlightFillColor: COL_EXP, highlightStrokeColor: COL_EXP
        });

        // ── Graph label: "B" ────────────────────────────────────────────
        board.create('text', [-1.5, 8.2, '<b>B</b>'], {
            fontSize: 14, color: '#333333', fixed: true, highlight: false
        });

        // ── Tooltip for intersection point ──────────────────────────────
        var tooltip = document.getElementById('tooltip');
        var boardContainer = document.getElementById('board');

        function showTooltip(pt, color) {
            var xCoord = pt.X();
            var yCoord = pt.Y();
            var xLatex = '1 + \\log_3 5';
            var yLatex = '5';
            var latex = '\\color{' + color + '}{\\left(' + xLatex + ',\\,' + yLatex + '\\right)}';
            katex.render(latex, tooltip, { throwOnError: false });
            tooltip.style.borderColor = color;
            tooltip.style.display = 'block';
            var rect = boardContainer.getBoundingClientRect();
            var coords = new JXG.Coords(JXG.COORDS_BY_USER, [xCoord, yCoord], board);
            var sx = coords.scrCoords[1] + rect.left;
            var sy = coords.scrCoords[2] + rect.top;
            tooltip.style.left = (sx + 14) + 'px';
            tooltip.style.top = (sy - 28) + 'px';
        }

        function hideTooltip() { tooltip.style.display = 'none'; }

        intPt.on('over', function() { showTooltip(intPt, COL_EXP); });
        intPt.on('out', function() { hideTooltip(); });
    </script>
</body>
</html>
