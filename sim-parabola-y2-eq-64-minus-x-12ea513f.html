<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of y² = 64 − x</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 300px; margin: 0 auto; padding: 4px; height: calc(100% - 8px); }
        .board-wrapper { background: white; border-radius: 8px; padding: 6px; height: calc(100% - 12px); }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-12, 12, 76, -12],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#D1D5DB',
                        minorTicks: 0,
                        ticksDistance: 8,
                        majorHeight: 0,
                        drawLabels: false,
                        drawZero: false
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#D1D5DB',
                        minorTicks: 0,
                        ticksDistance: 8,
                        majorHeight: 0,
                        drawLabels: false,
                        drawZero: false
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* Axis labels near arrow tips */
        board.create('text', [73.5, -1.2, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [1.2, 11.2, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        /* Parabola y² = 64 − x  ⟹  x = 64 − t², y = t, t ∈ [−8, 8] */
        board.create('curve', [
            function(t) { return 64 - t * t; },
            function(t) { return t; },
            -8, 8
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        /* Vertex at (64, 0) */
        board.create('point', [64, 0], {
            name: '',
            size: 4,
            color: '#222222',
            fixed: true,
            highlight: false,
            showInfobox: false
        });

        /* Vertex label */
        board.create('text', [64, -2.2, '(64, 0)'], {
            fontSize: 11,
            color: '#222222',
            anchorX: 'middle',
            anchorY: 'top',
            fixed: true,
            highlight: false,
            useKatex: true
        });

    </script>
</body>
</html>
