<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Root x+3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 300px;
            margin: 0;
            padding: 4px;
            height: calc(100% - 8px);
        }
        .board-wrapper {
            background: white;
            border-radius: 6px;
            padding: 6px;
            height: calc(100% - 12px);
        }
        #board {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-6, 4.5, 8, -4.5],
            axis: false,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        /* Create axes manually for full tick control */
        var xAxis = board.create('axis', [[0, 0], [1, 0]], {
            strokeColor: '#444444',
            strokeWidth: 1.2,
            lastArrow: { type: 2, size: 5 },
            highlight: false,
            ticks: {
                ticksDistance: 1,
                majorHeight: 0,
                minorHeight: 0,
                minorTicks: 0,
                drawZero: false,
                label: {
                    fontSize: 10,
                    color: '#444444',
                    offset: [0, -10]
                }
            }
        });

        var yAxis = board.create('axis', [[0, 0], [0, 1]], {
            strokeColor: '#444444',
            strokeWidth: 1.2,
            lastArrow: { type: 2, size: 5 },
            highlight: false,
            ticks: {
                ticksDistance: 1,
                majorHeight: 0,
                minorHeight: 0,
                minorTicks: 0,
                drawZero: false,
                label: {
                    fontSize: 10,
                    color: '#444444',
                    offset: [-12, 0]
                }
            }
        });

        /* Axis labels: x and y */
        board.create('text', [7.4, -0.5, '<i>x</i>'], {
            fontSize: 13, color: '#444444', fixed: true, highlight: false
        });
        board.create('text', [0.3, 4.1, '<i>y</i>'], {
            fontSize: 13, color: '#444444', fixed: true, highlight: false
        });

        /* Curve: f(x) = cbrt(x + 3) */
        board.create('functiongraph', [
            function(x) { return Math.cbrt(x + 3); }
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
