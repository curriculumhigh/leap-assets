<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Graph of 4√x</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css"><script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script><style>html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; } .container { padding: 0; height: 100%; } .board-wrapper { background: white; border-radius: 6px; padding: 6px; height: calc(100% - 12px); } #board { width: 100%; height: 100%; }</style></head><body><div class="container"><div class="board-wrapper"><div id="board"></div></div></div><script>var board = JXG.JSXGraph.initBoard('board', { boundingbox: [-1.8, 15, 11.5, -2.5], axis: true, showNavigation: false, showCopyright: false, pan: { enabled: false }, zoom: { enabled: false }, defaultAxes: { x: { strokeColor: '#444444', strokeWidth: 1.2, lastArrow: { type: 2, size: 5 }, ticks: { strokeColor: 'transparent', strokeWidth: 0, majorHeight: 0, minorHeight: 0, minorTicks: 0, ticksDistance: 2, label: { fontSize: 10, offset: [0, -12] } } }, y: { strokeColor: '#444444', strokeWidth: 1.2, lastArrow: { type: 2, size: 5 }, ticks: { strokeColor: 'transparent', strokeWidth: 0, majorHeight: 0, minorHeight: 0, minorTicks: 0, ticksDistance: 4, label: { fontSize: 10, offset: [-18, 0] } } } }, grid: { strokeColor: '#D1D5DB', strokeWidth: 0.4 } }); board.create('text', [11.0, -0.9, '<i>x</i>'], { fontSize: 13, fixed: true, highlight: false }); board.create('text', [0.3, 14.3, '<i>y</i>'], { fontSize: 13, fixed: true, highlight: false }); board.create('functiongraph', [ function(x) { if (x < 0) return NaN; return 4 * Math.sqrt(x); }, 0, 12 ], { strokeColor: '#222222', strokeWidth: 1.8, fixed: true, highlight: false });</script></body></html>
