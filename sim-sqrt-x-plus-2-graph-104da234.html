<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of sqrt(x) + 2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 320px;
            margin: 0 auto;
            padding: 6px;
            height: calc(100% - 12px);
        }
        .board-wrapper {
            background: white;
            border-radius: 8px;
            padding: 10px;
            width: 300px;
            height: 300px;
        }
        #board {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>

    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-1, 7, 9, -1],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            offset: [0, -12]
                        },
                        drawZero: false
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 6 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        minorTicks: 0,
                        ticksDistance: 2,
                        label: {
                            fontSize: 11,
                            color: '#444444',
                            offset: [-12, 0]
                        },
                        drawZero: false
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [8.6, -0.4, '<i>x</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });
        board.create('text', [0.2, 6.6, '<i>y</i>'], {
            fontSize: 14, fixed: true, highlight: false
        });

        // Function: sqrt(x) + 2, domain x >= 0
        board.create('functiongraph', [
            function(x) { return Math.sqrt(x) + 2; },
            0, 9.5
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });

        // Endpoint at (0, 2)
        board.create('point', [0, 2], {
            name: '',
            size: 5,
            color: '#222222',
            fixed: true,
            highlight: false,
            showInfobox: false
        });
    </script>
</body>
</html>
