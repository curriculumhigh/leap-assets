<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph of sqrt(x-4)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: transparent; }
        .container { padding: 4px; height: calc(100% - 8px); }
        .board-wrapper { background: white; border-radius: 6px; padding: 6px; height: calc(100% - 12px); }
        #board { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <script>
        var board = JXG.JSXGraph.initBoard('board', {
            boundingbox: [-1.5, 4.2, 12.5, -1.8],
            axis: true,
            showNavigation: false,
            showCopyright: false,
            pan: { enabled: false },
            zoom: { enabled: false },
            defaultAxes: {
                x: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 5 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        ticksDistance: 2,
                        minorTicks: 0,
                        label: { fontSize: 10, offset: [0, -12] },
                        drawZero: false
                    }
                },
                y: {
                    strokeColor: '#444444',
                    strokeWidth: 1.2,
                    lastArrow: { type: 2, size: 5 },
                    ticks: {
                        strokeColor: '#444444',
                        majorHeight: 0,
                        minorHeight: 0,
                        ticksDistance: 1,
                        minorTicks: 0,
                        label: { fontSize: 10, offset: [-12, 0] },
                        drawZero: false
                    }
                }
            },
            grid: {
                strokeColor: '#D1D5DB',
                strokeWidth: 0.4
            }
        });

        // Axis labels near arrow tips
        board.create('text', [12.0, -0.45, '<i>x</i>'], {
            fontSize: 13, fixed: true, highlight: false
        });
        board.create('text', [0.2, 3.85, '<i>y</i>'], {
            fontSize: 13, fixed: true, highlight: false
        });

        // Function: f(x) = sqrt(x - 4), domain x >= 4
        board.create('functiongraph', [
            function(x) { return Math.sqrt(x - 4); },
            4, 13
        ], {
            strokeColor: '#222222',
            strokeWidth: 1.8,
            fixed: true,
            highlight: false
        });
    </script>
</body>
</html>
